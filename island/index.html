<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="robots" content="noindex,nofollow" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Terminal-built 3D world + local LLM</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#0a0f14;font-family:ui-monospace,"SF Mono",Menlo,monospace}
  #app{position:fixed;inset:0}
  canvas{display:block}
  .hud{position:fixed;left:18px;top:16px;z-index:10;color:#dfe8ee;font-size:13px;letter-spacing:.02em;
    background:rgba(10,15,20,.42);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.12);
    border-radius:12px;padding:12px 14px;max-width:300px;line-height:1.5}
  .hud b{color:#7fd1c9}
  .hud .k{color:#8fa3b0}
  .npc{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:10;width:min(620px,92vw);
    background:rgba(12,18,24,.72);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.14);
    border-radius:16px;padding:16px 18px;color:#eef4f7}
  .npc .who{display:flex;align-items:center;gap:9px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#f0a884;margin-bottom:8px}
  .npc .dot{width:9px;height:9px;border-radius:50%;background:#7fd1c9;box-shadow:0 0 10px #7fd1c9}
  .npc .line{font-family:Georgia,serif;font-size:19px;line-height:1.45}
  .npc .src{margin-top:10px;font-size:11px;color:#7f93a0;letter-spacing:.04em}
  .npc .src b{color:#7fd1c9}
  .btn{margin-top:12px;display:inline-flex;align-items:center;gap:8px;cursor:pointer;user-select:none;
    font-family:ui-monospace,monospace;font-size:12px;color:#0a0f14;background:#7fd1c9;border:none;border-radius:999px;padding:8px 16px;font-weight:600}
  .btn:active{transform:translateY(1px)}
</style>
</head>
<body>
<div id="app"></div>
<div class="hud">
  <div><b>Sunset Cove</b> — a tiny 3D world</div>
  <div class="k">drag to orbit · scroll to zoom</div>
  <div class="k" style="margin-top:6px">rendered by three.js, authored in a terminal, zero engine, zero cost.</div>
</div>
<div class="npc">
  <div class="who"><span class="dot"></span><span id="npcname">Marlow, the boatkeeper</span></div>
  <div class="line" id="npcline">Loading a thought…</div>
  <div class="src">dialogue generated by <b id="srctag">a local LLM (offline, free)</b></div>
  <button class="btn" id="next">Ask again &rarr;</button>
</div>

<script>window.__LLM_LINES__ = ["Yer winds be changin', as they do. I'm havin' tides on my mind.", "Sunset Cove ain't much, but her secrets be storied deep in the water.", "Look out for comin' storms, nothin' but clouds a-blazin'.", "Time's been slow here since yer first footsteps touched 'er sand.", "And yonder moon? It'll be us lighthouse eyes that guide ya back home.", "Dunes whisper tales in the breeze, but some secrets are best left unspoken."];</script>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color('#12283a');
scene.fog = new THREE.Fog('#1b3550', 60, 200);

const camera = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(34, 22, 40);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.target.set(0, 3, 0);
controls.minDistance = 14;
controls.maxDistance = 120;
controls.maxPolarAngle = Math.PI * 0.49;

// ---- lights: warm low sun + cool sky fill ----
const sun = new THREE.DirectionalLight('#ffd9a0', 2.1);
sun.position.set(-40, 26, 18);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-60; sun.shadow.camera.right=60; sun.shadow.camera.top=60; sun.shadow.camera.bottom=-60;
scene.add(sun);
scene.add(new THREE.HemisphereLight('#bcd8ff', '#2a3b2f', 0.7));
scene.add(new THREE.AmbientLight('#40506a', 0.5));

// warm sun disc on the horizon
const sunDisc = new THREE.Mesh(new THREE.CircleGeometry(9, 48), new THREE.MeshBasicMaterial({ color:'#ffb060', fog:false }));
sunDisc.position.set(-95, 20, -70); sunDisc.lookAt(camera.position);
scene.add(sunDisc);

// ---- water ----
const water = new THREE.Mesh(
  new THREE.PlaneGeometry(600, 600, 80, 80),
  new THREE.MeshStandardMaterial({ color:'#1c5c74', metalness:0.55, roughness:0.28, transparent:true, opacity:0.94 })
);
water.rotation.x = -Math.PI/2; water.position.y = 0; water.receiveShadow = true;
scene.add(water);
const waterPos = water.geometry.attributes.position;
const base = Float32Array.from(waterPos.array);

// ---- island ----
const island = new THREE.Mesh(
  new THREE.CylinderGeometry(15, 19, 6, 48, 1),
  new THREE.MeshStandardMaterial({ color:'#c9b487', roughness:1 })
);
island.position.y = 1.2; island.castShadow = island.receiveShadow = true;
scene.add(island);
const grass = new THREE.Mesh(
  new THREE.CylinderGeometry(12.5, 15, 3.4, 48),
  new THREE.MeshStandardMaterial({ color:'#5f8f52', roughness:1 })
);
grass.position.y = 3.6; grass.castShadow = grass.receiveShadow = true;
scene.add(grass);

// ---- trees ----
function tree(x,z,s=1){
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4*s,0.55*s,3*s,7),
    new THREE.MeshStandardMaterial({color:'#7a5230',roughness:1}));
  trunk.position.y = 1.5*s; trunk.castShadow=true;
  const leaves = new THREE.Mesh(new THREE.ConeGeometry(2.2*s,4.5*s,8),
    new THREE.MeshStandardMaterial({color:'#3f7d46',roughness:1}));
  leaves.position.y = 4.6*s; leaves.castShadow=true;
  g.add(trunk,leaves); g.position.set(x,4.9,z); return g;
}
const rng=(a,b)=>a+Math.random()*(b-a);
for(let i=0;i<14;i++){ const a=Math.random()*Math.PI*2, r=rng(2,10);
  scene.add(tree(Math.cos(a)*r, Math.sin(a)*r, rng(0.6,1.25))); }

// ---- the NPC (a little boatkeeper by the shore) ----
const npc = new THREE.Group();
const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.9,1.7,4,10),
  new THREE.MeshStandardMaterial({color:'#c8643a',roughness:0.9}));
body.position.y=1.6; body.castShadow=true;
const head = new THREE.Mesh(new THREE.SphereGeometry(0.75,16,16),
  new THREE.MeshStandardMaterial({color:'#e8c9a6',roughness:1}));
head.position.y=3.1; head.castShadow=true;
npc.add(body,head); npc.position.set(11,5,6); scene.add(npc);
// a marker ring under the NPC
const ring = new THREE.Mesh(new THREE.TorusGeometry(1.6,0.09,8,40),
  new THREE.MeshBasicMaterial({color:'#7fd1c9'}));
ring.rotation.x=-Math.PI/2; ring.position.set(11,5.05,6); scene.add(ring);

// ---- little boat ----
const boat = new THREE.Group();
const hull = new THREE.Mesh(new THREE.CapsuleGeometry(1,3.4,3,8),
  new THREE.MeshStandardMaterial({color:'#8a5a33',roughness:1}));
hull.rotation.z=Math.PI/2; hull.scale.set(1,1,0.5); hull.castShadow=true;
boat.add(hull); boat.position.set(17,0.5,9); scene.add(boat);

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// ---- NPC dialogue: filled by the local LLM (array injected below) ----
const LINES = window.__LLM_LINES__ || [
  "The tide's turning. You can smell it before you see it.",
  "Sit a while. The cove keeps no clocks.",
  "Storm took the east jetty last spring. We build lower now."
];
let li = 0;
const lineEl = document.getElementById('npcline');
const nextBtn = document.getElementById('next');
function show(){ lineEl.textContent = LINES[li % LINES.length]; li++; }
nextBtn.addEventListener('click', show);
show();

const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  // ripple the water
  for(let i=0;i<waterPos.count;i++){
    const x=base[i*3], z=base[i*3+2];
    waterPos.array[i*3+1] = Math.sin(x*0.08+t*1.1)*0.35 + Math.cos(z*0.11+t*0.9)*0.3;
  }
  waterPos.needsUpdate=true;
  ring.scale.setScalar(1+Math.sin(t*2)*0.06);
  boat.position.y = 0.5 + Math.sin(t*1.3)*0.18;
  boat.rotation.z = Math.sin(t*1.1)*0.05;
  npc.position.y = 5 + Math.sin(t*2)*0.05;
  sunDisc.lookAt(camera.position);
  controls.update();
  renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>

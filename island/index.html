<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="robots" content="noindex,nofollow" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Singapore, in 3D — HDB estate</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#0a0d12;font-family:ui-monospace,"SF Mono",Menlo,monospace}
  #app{position:fixed;inset:0}
  canvas{display:block}
  .hud{position:fixed;left:16px;top:14px;z-index:10;color:#e8eef2;font-size:12.5px;letter-spacing:.02em;
    background:rgba(10,14,20,.4);backdrop-filter:blur(7px);border:1px solid rgba(255,255,255,.12);
    border-radius:12px;padding:11px 13px;max-width:290px;line-height:1.5}
  .hud b{color:#7fd1c9}
  .hud .k{color:#93a4b0}
  .badge{position:fixed;right:16px;top:14px;z-index:10;color:#0a0d12;background:#f0a884;font-size:11px;font-weight:700;
    letter-spacing:.06em;text-transform:uppercase;border-radius:999px;padding:6px 12px}
  .load{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
    background:#0a0d12;color:#7fd1c9;font-size:14px;letter-spacing:.1em;transition:opacity .6s}
</style>
</head>
<body>
<div id="app"></div>
<div class="hud">
  <div><b>Singapore</b> — a first HDB estate</div>
  <div class="k">drag to orbit · pinch / scroll to zoom</div>
  <div class="k" style="margin-top:5px">three.js · dusk · one small estate. town by town from here.</div>
</div>
<div class="badge">WIP v1</div>
<div class="load" id="load">building the estate…</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Sky } from 'three/addons/objects/Sky.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { SMAAPass } from 'three/addons/postprocessing/SMAAPass.js';

const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias:false, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.82;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xd6ab7c, 0.0011);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.5, 4000);
camera.position.set(78, 46, 92);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.05;
controls.target.set(0, 12, 0);
controls.minDistance = 26; controls.maxDistance = 260;
controls.maxPolarAngle = Math.PI*0.492;

// ---------- environment (PBR reflections) ----------
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

// ---------- sky + sun (dusk) ----------
const sky = new Sky(); sky.scale.setScalar(4000); scene.add(sky);
const su = sky.material.uniforms;
su.turbidity.value = 10; su.rayleigh.value = 3.0; su.mieCoefficient.value = 0.005; su.mieDirectionalG.value = 0.86;
const elev = 5.2, azi = -104;
const phi = THREE.MathUtils.degToRad(90-elev), theta = THREE.MathUtils.degToRad(azi);
const sunPos = new THREE.Vector3().setFromSphericalCoords(1, phi, theta);
su.sunPosition.value.copy(sunPos);

const sun = new THREE.DirectionalLight(0xffb06a, 2.2);
sun.position.copy(sunPos).multiplyScalar(220);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near = 10; sun.shadow.camera.far = 620;
const sc = 150; Object.assign(sun.shadow.camera, {left:-sc,right:sc,top:sc,bottom:-sc});
sun.shadow.bias = -0.0004; sun.shadow.normalBias = 0.6;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0xffd9ad, 0x2b3324, 0.5));

// ---------- helpers ----------
const rand = (a,b)=>a+Math.random()*(b-a);
const pick = arr => arr[(Math.random()*arr.length)|0];
const ACCENTS = ['#3f8f86','#d2542a','#e0a53a','#4a6fa5','#b6543f'];

function canvasTex(c, srgb=true){
  const t = new THREE.CanvasTexture(c);
  if(srgb) t.colorSpace = THREE.SRGBColorSpace;
  t.anisotropy = 8; t.needsUpdate = true; return t;
}

// facade texture: window grid + aircon ledges + slabs + accent + lit windows (emissive)
function facade(units, floors, accent){
  const pw=42, ph=66;
  const c=document.createElement('canvas'); c.width=units*pw; c.height=floors*ph;
  const g=c.getContext('2d');
  const e=document.createElement('canvas'); e.width=c.width; e.height=c.height;
  const eg=e.getContext('2d'); eg.fillStyle='#000'; eg.fillRect(0,0,e.width,e.height);
  // concrete base with faint vertical streaks
  g.fillStyle='#d3ccbf'; g.fillRect(0,0,c.width,c.height);
  for(let i=0;i<units*3;i++){ g.fillStyle='rgba(150,140,125,'+rand(0.03,0.09).toFixed(3)+')';
    const x=rand(0,c.width); g.fillRect(x,0,rand(1,3),c.height); }
  // accent vertical bay
  const bay = (Math.random()<0.75) ? (1+((Math.random()*(units-2))|0)) : -1;
  for(let f=0; f<floors; f++){
    const y = c.height-(f+1)*ph;
    // floor slab
    g.fillStyle='#e7e1d6'; g.fillRect(0,y,c.width,5);
    g.fillStyle='rgba(90,80,66,0.18)'; g.fillRect(0,y+5,c.width,2);
    for(let u=0; u<units; u++){
      const x=u*pw;
      if(u===bay){ g.fillStyle=accent+'e0'; g.fillRect(x+3,y+3,pw-6,ph-6); }
      // window
      const wx=x+8, wy=y+13, ww=pw-16, wh=ph-26;
      const lit = Math.random()<0.22;
      g.fillStyle = lit ? '#ffd9a2' : (Math.random()<0.5?'#39454f':'#43505a');
      g.fillRect(wx,wy,ww,wh);
      g.strokeStyle='#8f8a7c'; g.lineWidth=2; g.strokeRect(wx,wy,ww,wh);
      g.fillStyle='#787264'; g.fillRect(wx+ww/2-1,wy,2,wh);
      // aircon ledge
      g.fillStyle='#b9af9d'; g.fillRect(x+pw-12, y+ph-16, 9, 12);
      g.fillStyle='#9a9082'; g.fillRect(x+pw-12, y+ph-16, 9, 3);
      if(lit){ eg.fillStyle='#ffcf93'; eg.fillRect(wx,wy,ww,wh); }
    }
  }
  return { map: canvasTex(c), emiss: canvasTex(e) };
}

const concrete = new THREE.MeshStandardMaterial({ color:0xc4bcae, roughness:0.9, metalness:0 });
const darkMat  = new THREE.MeshStandardMaterial({ color:0x2a2b2b, roughness:1 });

function facadeMat(units, floors, accent){
  const f = facade(units, floors, accent);
  return new THREE.MeshStandardMaterial({ map:f.map, emissive:0xffffff, emissiveMap:f.emiss,
    emissiveIntensity:0.7, roughness:0.72, metalness:0.02, envMapIntensity:0.5 });
}

// one HDB slab block on a void deck
function block(opts){
  const { W, D, floors } = opts;
  const H = floors*3.0, voidH = 4.2;
  const grp = new THREE.Group();
  const uW = Math.max(3, Math.round(W/3.2)), uD = Math.max(2, Math.round(D/3.2));
  const accent = pick(ACCENTS);
  const front = facadeMat(uW, floors, accent);
  const end   = facadeMat(uD, floors, accent);
  const mats = [end, end, concrete, darkMat, front, front]; // px,nx,py,ny,pz,nz
  const body = new THREE.Mesh(new THREE.BoxGeometry(W,H,D), mats);
  body.position.y = voidH + H/2; body.castShadow = body.receiveShadow = true;
  grp.add(body);
  // void deck slab + columns
  const deck = new THREE.Mesh(new THREE.BoxGeometry(W+0.6, voidH, D+0.6),
    new THREE.MeshStandardMaterial({color:0xbfb6a6, roughness:1}));
  deck.position.y = voidH/2; deck.receiveShadow = true; deck.castShadow = true;
  // hollow look: overlay darker inset
  const inset = new THREE.Mesh(new THREE.BoxGeometry(W-2, voidH-1.2, D-2), darkMat);
  inset.position.y = voidH/2; grp.add(inset); grp.add(deck);
  const nCol = Math.max(2, Math.round(W/6));
  for(let i=0;i<=nCol;i++){
    const x = -W/2 + (i/nCol)*W;
    for(const z of [-D/2+0.4, D/2-0.4]){
      const col = new THREE.Mesh(new THREE.BoxGeometry(0.6, voidH, 0.6), concrete);
      col.position.set(x, voidH/2, z); col.castShadow = true; grp.add(col);
    }
  }
  // roof slab + parapet + tanks + lift room
  const roofY = voidH + H;
  const roof = new THREE.Mesh(new THREE.BoxGeometry(W+0.8, 0.6, D+0.8), concrete);
  roof.position.y = roofY+0.3; roof.castShadow = roof.receiveShadow = true; grp.add(roof);
  const lift = new THREE.Mesh(new THREE.BoxGeometry(6, 3.2, D*0.5), concrete);
  lift.position.set(rand(-W*0.2,W*0.2), roofY+1.9, 0); lift.castShadow=true; grp.add(lift);
  for(let i=0;i<3;i++){
    const tank = new THREE.Mesh(new THREE.CylinderGeometry(1.5,1.5,2.4,12),
      new THREE.MeshStandardMaterial({color:0x4a6b7a, roughness:0.6, metalness:0.2}));
    tank.position.set(rand(-W*0.4,W*0.4), roofY+1.8, rand(-D*0.3,D*0.3)); tank.castShadow=true; grp.add(tank);
  }
  return grp;
}

// ---------- ground (painted: grass, roads, court, carpark, walkways) ----------
const GROUND = 260, GS = 2048;
function w2c(x){ return (x+GROUND/2)/GROUND*GS; }
const positions = [
  {x:-38,z:-30,r: 0.15,W:60,D:11,floors:12},
  {x: 30,z:-40,r:-0.1, W:46,D:11,floors:16},
  {x: 52,z: 22,r: 1.62,W:52,D:11,floors:10},
  {x:-52,z: 26,r: 1.55,W:48,D:11,floors:14},
  {x:  2,z: 54,r: 0.0, W:64,D:11,floors:11},
];
function groundTex(){
  const c=document.createElement('canvas'); c.width=c.height=GS; const g=c.getContext('2d');
  // grass base + noise
  g.fillStyle='#5f7d43'; g.fillRect(0,0,GS,GS);
  for(let i=0;i<26000;i++){ g.fillStyle='rgba('+(60+Math.random()*40|0)+','+(95+Math.random()*55|0)+','+(45+Math.random()*35|0)+','+(0.08+Math.random()*0.12).toFixed(2)+')';
    const s=Math.random()*3+1; g.fillRect(Math.random()*GS,Math.random()*GS,s,s); }
  // perimeter ring road
  g.strokeStyle='#3a3d40'; g.lineWidth=w2c(11)-w2c(0); g.lineJoin='round';
  g.strokeRect(w2c(-95),w2c(-95),w2c(95)-w2c(-95),w2c(95)-w2c(-95));
  // lane dashes
  g.strokeStyle='#d8d2c2'; g.lineWidth=2; g.setLineDash([16,20]);
  g.strokeRect(w2c(-95),w2c(-95),w2c(95)-w2c(-95),w2c(95)-w2c(-95));
  g.setLineDash([]);
  // walkways connecting blocks to centre
  g.strokeStyle='#b9b2a1'; g.lineWidth=w2c(3)-w2c(0); g.lineCap='round';
  for(const p of positions){ g.beginPath(); g.moveTo(w2c(0),w2c(0)); g.lineTo(w2c(p.x),w2c(p.z)); g.stroke(); }
  // central court (futsal)
  g.fillStyle='#356b4e'; g.fillRect(w2c(-13),w2c(-11),w2c(13)-w2c(-13),w2c(11)-w2c(-11));
  g.strokeStyle='#e8e2d4'; g.lineWidth=3; g.strokeRect(w2c(-13),w2c(-11),w2c(13)-w2c(-13),w2c(11)-w2c(-11));
  g.beginPath(); g.arc(w2c(0),w2c(0),w2c(4)-w2c(0),0,7); g.stroke();
  g.beginPath(); g.moveTo(w2c(0),w2c(-11)); g.lineTo(w2c(0),w2c(11)); g.stroke();
  // carpark (SE) with lot lines
  g.fillStyle='#41443f'; g.fillRect(w2c(58),w2c(50),w2c(86)-w2c(58),w2c(80)-w2c(50));
  g.strokeStyle='#d8d2c2'; g.lineWidth=2;
  for(let i=0;i<=7;i++){ const x=w2c(58)+(w2c(86)-w2c(58))*i/7; g.beginPath(); g.moveTo(x,w2c(50)); g.lineTo(x,w2c(80)); g.stroke(); }
  const t = canvasTex(c); t.wrapS=t.wrapT=THREE.ClampToEdgeWrapping; return t;
}
const ground = new THREE.Mesh(new THREE.PlaneGeometry(GROUND,GROUND),
  new THREE.MeshStandardMaterial({ map:groundTex(), roughness:0.96, metalness:0 }));
ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

// ---------- place blocks ----------
for(const p of positions){ const b=block(p); b.position.set(p.x,0,p.z); b.rotation.y=p.r; scene.add(b); }

// ---------- trees (rain-tree canopies) ----------
const foliageMats = [0x3f6b39,0x4a7d43,0x35602f].map(c=>new THREE.MeshStandardMaterial({color:c,roughness:1,flatShading:true}));
const trunkMat = new THREE.MeshStandardMaterial({color:0x5f4630,roughness:1});
function tree(x,z,s=1){
  const g=new THREE.Group();
  const tr=new THREE.Mesh(new THREE.CylinderGeometry(0.4*s,0.7*s,4.5*s,7),trunkMat);
  tr.position.y=2.2*s; tr.castShadow=true; g.add(tr);
  for(let i=0;i<4;i++){ const bl=new THREE.Mesh(new THREE.IcosahedronGeometry(rand(2.4,3.6)*s,1),pick(foliageMats));
    bl.position.set(rand(-2,2)*s, rand(4.5,6.5)*s, rand(-2,2)*s); bl.scale.y=0.7; bl.castShadow=true; g.add(bl); }
  g.position.set(x,0,z); return g;
}
const treeSpots=[[-70,-60],[68,-64],[-78,60],[74,66],[-15,-70],[18,72],[-68,0],[70,-6],[0,-58],[-40,64],[44,-8],[-6,30]];
for(const [x,z] of treeSpots) scene.add(tree(x,z,rand(0.85,1.3)));

// ---------- street lamps (emissive heads bloom) ----------
const lampHead = new THREE.MeshStandardMaterial({color:0xffe6b0, emissive:0xffca7a, emissiveIntensity:3});
function lamp(x,z){
  const g=new THREE.Group();
  const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.2,7,8),new THREE.MeshStandardMaterial({color:0x6a6f74,roughness:0.6,metalness:0.4}));
  pole.position.y=3.5; pole.castShadow=true; g.add(pole);
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.45,12,12),lampHead); head.position.y=7; g.add(head);
  const pt=new THREE.PointLight(0xffca82, 14, 26, 2); pt.position.set(0,6.6,0); g.add(pt);
  g.position.set(x,0,z); return g;
}
for(const [x,z] of [[-20,-8],[22,-6],[-8,20],[16,18],[-30,40],[36,36],[0,-20],[-46,-2]]) scene.add(lamp(x,z));

// ---------- a few parked cars ----------
function car(x,z,ry,col){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(2,0.9,4.4),new THREE.MeshStandardMaterial({color:col,roughness:0.35,metalness:0.4}));
  body.position.y=0.75; body.castShadow=true;
  const cab=new THREE.Mesh(new THREE.BoxGeometry(1.8,0.8,2.2),new THREE.MeshStandardMaterial({color:0x20242a,roughness:0.2,metalness:0.3,envMapIntensity:1}));
  cab.position.set(0,1.45,-0.2); cab.castShadow=true; g.add(body,cab);
  for(const [wx,wz] of [[-1,1.4],[1,1.4],[-1,-1.4],[1,-1.4]]){
    const w=new THREE.Mesh(new THREE.CylinderGeometry(0.42,0.42,0.3,12),darkMat); w.rotation.z=Math.PI/2; w.position.set(wx,0.42,wz); g.add(w);
  }
  g.position.set(x,0,z); g.rotation.y=ry; return g;
}
const carCols=[0xb43a2e,0xe8e6e2,0x2a2f36,0x35506e,0xc9c2b4];
let ci=0; for(let i=0;i<6;i++){ scene.add(car(rand(60,84), rand(52,78), Math.PI/2, carCols[ci++%carCols.length])); }

// ---------- playground blobs in the court ----------
for(let i=0;i<5;i++){ const hh=rand(1.2,2.6); const b=new THREE.Mesh(new THREE.BoxGeometry(rand(1.2,2.2),hh,rand(1.2,2.2)),
  new THREE.MeshStandardMaterial({color:pick(ACCENTS),roughness:0.85})); b.position.set(rand(-7,7),hh/2,rand(-5,5)); b.castShadow=true; b.receiveShadow=true; scene.add(b); }

// ---------- post-processing ----------
const composer = new EffectComposer(renderer);
composer.setPixelRatio(Math.min(devicePixelRatio,2));
composer.setSize(innerWidth, innerHeight);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), 0.34, 0.4, 0.9);
composer.addPass(bloom);
composer.addPass(new OutputPass());
const smaa = new SMAAPass(innerWidth, innerHeight); composer.addPass(smaa);

addEventListener('resize', ()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); composer.setSize(innerWidth,innerHeight);
});

const loadEl=document.getElementById('load');
let frames=0;
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  composer.render();
  if(++frames===3){ loadEl.style.opacity='0'; setTimeout(()=>loadEl.remove(),700); }
}
animate();
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="robots" content="noindex,nofollow" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Singapore, in 3D — HDB estate</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#0a0d12;font-family:ui-monospace,"SF Mono",Menlo,monospace}
  #app{position:fixed;inset:0}
  canvas{display:block}
  .hud{position:fixed;left:16px;top:14px;z-index:10;color:#e8eef2;font-size:12.5px;letter-spacing:.02em;
    background:rgba(10,14,20,.4);backdrop-filter:blur(7px);border:1px solid rgba(255,255,255,.12);
    border-radius:12px;padding:11px 13px;max-width:290px;line-height:1.5}
  .hud b{color:#7fd1c9}
  .hud .k{color:#93a4b0}
  .badge{position:fixed;right:16px;top:14px;z-index:10;color:#0a0d12;background:#f0a884;font-size:11px;font-weight:700;
    letter-spacing:.06em;text-transform:uppercase;border-radius:999px;padding:6px 12px}
  .load{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
    background:#0a0d12;color:#7fd1c9;font-size:14px;letter-spacing:.1em;transition:opacity .6s}
</style>
</head>
<body>
<div id="app"></div>
<div class="hud">
  <div><b>Singapore</b> — a first HDB estate</div>
  <div class="k">drag to orbit · pinch / scroll to zoom</div>
  <div class="k" style="margin-top:5px">three.js · HDRI light · realism pass. town by town from here.</div>
</div>
<div class="badge">WIP v2</div>
<div class="load" id="load">building the estate…</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { GTAOPass } from 'three/addons/postprocessing/GTAOPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { SMAAPass } from 'three/addons/postprocessing/SMAAPass.js';

const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias:false, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.72;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color('#b9c4cb');
scene.fog = new THREE.FogExp2(0xc3ccd0, 0.0016);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.5, 5000);
camera.position.set(72, 40, 88);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.05;
controls.target.set(0, 14, 0);
controls.minDistance = 26; controls.maxDistance = 240;
controls.maxPolarAngle = Math.PI*0.492;

// ---------- HDRI environment + sky ----------
new RGBELoader().load('env.hdr', (hdr)=>{
  hdr.mapping = THREE.EquirectangularReflectionMapping;
  scene.environment = hdr;
  scene.background = hdr;
  scene.backgroundBlurriness = 0.02;
  scene.environmentIntensity = 0.82;
});

// ---------- sun (crisp shadow to complement soft HDRI light) ----------
const sun = new THREE.DirectionalLight(0xfff1dd, 2.3);
sun.position.set(60, 120, 40);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near = 10; sun.shadow.camera.far = 620;
const sc=150; Object.assign(sun.shadow.camera,{left:-sc,right:sc,top:sc,bottom:-sc});
sun.shadow.bias=-0.0004; sun.shadow.normalBias=0.5;
scene.add(sun);

// ---------- helpers ----------
const rand=(a,b)=>a+Math.random()*(b-a);
const pick=a=>a[(Math.random()*a.length)|0];
const ACCENTS=['#3f8f86','#c9542c','#e0a53a','#4a6fa5','#8a5a8f','#7a9a3f'];

function tex(c, srgb=false){ const t=new THREE.CanvasTexture(c); if(srgb)t.colorSpace=THREE.SRGBColorSpace; t.anisotropy=8; return t; }
function heightToNormal(hc, strength){
  const w=hc.width,h=hc.height; const src=hc.getContext('2d').getImageData(0,0,w,h).data;
  const out=document.createElement('canvas'); out.width=w; out.height=h;
  const octx=out.getContext('2d'); const img=octx.createImageData(w,h); const d=img.data;
  const H=(x,y)=>src[((Math.max(0,Math.min(h-1,y))*w)+Math.max(0,Math.min(w-1,x)))*4]/255;
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const dx=(H(x-1,y)-H(x+1,y))*strength, dy=(H(x,y-1)-H(x,y+1))*strength;
    const l=Math.hypot(dx,dy,1), i=(y*w+x)*4;
    d[i]=(dx/l*.5+.5)*255; d[i+1]=(dy/l*.5+.5)*255; d[i+2]=(1/l*.5+.5)*255; d[i+3]=255;
  }
  octx.putImageData(img,0,0); return out;
}

// facade: color + height(->normal) + roughness + metalness maps
function facade(units, floors, accent){
  const pw=48, ph=72, W=units*pw, Hh=floors*ph;
  const mk=()=>{const c=document.createElement('canvas');c.width=W;c.height=Hh;return c;};
  const col=mk(), hgt=mk(), rgh=mk(), met=mk();
  const gc=col.getContext('2d'), gh=hgt.getContext('2d'), gr=rgh.getContext('2d'), gm=met.getContext('2d');
  gc.fillStyle='#bdb5a6'; gc.fillRect(0,0,W,Hh);
  gh.fillStyle='#808080'; gh.fillRect(0,0,W,Hh);
  gr.fillStyle='#d2d2d2'; gr.fillRect(0,0,W,Hh);
  gm.fillStyle='#000';    gm.fillRect(0,0,W,Hh);
  for(let i=0;i<units*floors*2;i++){ gc.fillStyle='rgba(120,112,98,'+rand(.02,.06).toFixed(3)+')'; gc.fillRect(rand(0,W),rand(0,Hh),rand(2,5),rand(2,5)); }
  const bay = Math.random()<0.7 ? 1+((Math.random()*(units-2))|0) : -1;
  for(let f=0;f<floors;f++){
    const y=Hh-(f+1)*ph;
    gc.fillStyle='#cfc8ba'; gc.fillRect(0,y,W,6);
    gh.fillStyle='#c8c8c8'; gh.fillRect(0,y-2,W,9);
    for(let u=0;u<units;u++){
      const x=u*pw;
      if(u===bay){ gc.fillStyle=accent; gc.fillRect(x+2,y+2,pw-4,ph-4); }
      const wx=x+9, wy=y+14, ww=pw-18, wh=ph-30;
      gc.fillStyle = Math.random()<0.5 ? '#2b3a44' : '#33454f'; gc.fillRect(wx,wy,ww,wh);
      gc.strokeStyle='#b8b2a2'; gc.lineWidth=3; gc.strokeRect(wx,wy,ww,wh);
      gc.fillStyle='#a9a293'; gc.fillRect(wx+ww/2-1.5,wy,3,wh);
      gh.fillStyle='#4a4a4a'; gh.fillRect(wx,wy,ww,wh);
      gh.strokeStyle='#dcdcdc'; gh.lineWidth=4; gh.strokeRect(wx,wy,ww,wh);
      gr.fillStyle='#2a2a2a'; gr.fillRect(wx,wy,ww,wh);
      gm.fillStyle='#8a8a8a'; gm.fillRect(wx,wy,ww,wh);
      gc.fillStyle='#b3a897'; gc.fillRect(x+pw-15,y+ph-18,12,14);
      gc.fillStyle='#8f8575'; gc.fillRect(x+pw-15,y+ph-18,12,3);
      gh.fillStyle='#e0e0e0'; gh.fillRect(x+pw-15,y+ph-18,12,14);
      gr.fillStyle='#c8c8c8'; gr.fillRect(x+pw-15,y+ph-18,12,14);
      const grd=gc.createLinearGradient(0,y+ph-6,0,y+ph+34);
      grd.addColorStop(0,'rgba(70,62,48,0.34)'); grd.addColorStop(1,'rgba(70,62,48,0)');
      gc.fillStyle=grd; gc.fillRect(x+pw-15,y+ph-6,12,40);
    }
  }
  const strength=2.4;
  return {
    map: tex(col,true),
    normalMap: tex(heightToNormal(hgt,strength)),
    roughnessMap: tex(rgh),
    metalnessMap: tex(met),
  };
}

const concrete = new THREE.MeshStandardMaterial({ color:0xb2aa9a, roughness:0.92, metalness:0 });
const darkMat  = new THREE.MeshStandardMaterial({ color:0x23262a, roughness:0.95 });

function facadeMat(units, floors, accent){
  const f=facade(units,floors,accent);
  return new THREE.MeshStandardMaterial({ map:f.map, normalMap:f.normalMap, normalScale:new THREE.Vector2(1,1),
    roughnessMap:f.roughnessMap, metalnessMap:f.metalnessMap, roughness:1, metalness:1, envMapIntensity:1.15 });
}

// ---------- HDB block ----------
function block(o){
  const {W,D,floors}=o, H=floors*3.0, voidH=4.4, g=new THREE.Group();
  const uW=Math.max(3,Math.round(W/3.4)), uD=Math.max(2,Math.round(D/3.4)), accent=pick(ACCENTS);
  const front=facadeMat(uW,floors,accent), end=facadeMat(uD,floors,accent);
  const body=new THREE.Mesh(new THREE.BoxGeometry(W,H,D),[end,end,concrete,darkMat,front,front]);
  body.position.y=voidH+H/2; body.castShadow=body.receiveShadow=true; g.add(body);
  const deck=new THREE.Mesh(new THREE.BoxGeometry(W+0.6,voidH,D+0.6),new THREE.MeshStandardMaterial({color:0xb9b0a0,roughness:1}));
  deck.position.y=voidH/2; deck.castShadow=deck.receiveShadow=true;
  const inset=new THREE.Mesh(new THREE.BoxGeometry(W-2.4,voidH-1.4,D-2.4),darkMat); inset.position.y=voidH/2;
  g.add(inset,deck);
  const nCol=Math.max(2,Math.round(W/6));
  for(let i=0;i<=nCol;i++){ const x=-W/2+(i/nCol)*W; for(const z of[-D/2+0.4,D/2-0.4]){
    const c=new THREE.Mesh(new THREE.BoxGeometry(0.6,voidH,0.6),concrete); c.position.set(x,voidH/2,z); c.castShadow=true; g.add(c);} }
  const ry=voidH+H;
  const roof=new THREE.Mesh(new THREE.BoxGeometry(W+0.8,0.6,D+0.8),concrete); roof.position.y=ry+0.3; roof.castShadow=roof.receiveShadow=true; g.add(roof);
  const para=new THREE.Mesh(new THREE.BoxGeometry(W+0.8,1.2,D+0.8),new THREE.MeshStandardMaterial({color:0xb7af9f,roughness:1}));
  para.position.y=ry+1.0; const paraHole=new THREE.Mesh(new THREE.BoxGeometry(W-0.8,1.4,D-0.8),new THREE.MeshStandardMaterial({color:0x30302e,roughness:1}));
  paraHole.position.y=ry+1.1; g.add(para,paraHole);
  const lift=new THREE.Mesh(new THREE.BoxGeometry(6,3.4,D*0.55),concrete); lift.position.set(rand(-W*0.2,W*0.2),ry+2.1,0); lift.castShadow=true; g.add(lift);
  for(let i=0;i<3;i++){ const t=new THREE.Mesh(new THREE.CylinderGeometry(1.5,1.5,2.6,14),new THREE.MeshStandardMaterial({color:0x5a7b88,roughness:0.5,metalness:0.3}));
    t.position.set(rand(-W*0.4,W*0.4),ry+2.0,rand(-D*0.3,D*0.3)); t.castShadow=true; g.add(t); }
  const poleMat=new THREE.MeshStandardMaterial({color:0xcaa46a,roughness:0.7});
  const cloth=['#d8443a','#f0f0ea','#3a6ea5','#e0b23a','#4a9e78','#c85a9a'];
  for(let i=0;i<Math.round(uW*floors*0.10);i++){
    const fl=(Math.random()*floors|0), uu=(Math.random()*uW|0);
    const px=-W/2+(uu+0.5)/uW*W, py=voidH+ (fl+0.5)*3.0, pz=D/2;
    const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,2.4,6),poleMat);
    pole.rotation.x=Math.PI/2; pole.position.set(px,py,pz+1.2); g.add(pole);
    const cl=new THREE.Mesh(new THREE.PlaneGeometry(0.7,1.3),new THREE.MeshStandardMaterial({color:pick(cloth),roughness:0.9,side:THREE.DoubleSide}));
    cl.position.set(px,py-0.5,pz+1.2+rand(-0.6,0.6)); g.add(cl);
  }
  return g;
}

// ---------- ground ----------
const GROUND=260, GS=2048;
const w2c=x=>(x+GROUND/2)/GROUND*GS;
const positions=[
  {x:-38,z:-30,r:0.12,W:60,D:11,floors:12},
  {x:30,z:-42,r:-0.08,W:46,D:11,floors:16},
  {x:54,z:22,r:1.60,W:52,D:11,floors:10},
  {x:-54,z:26,r:1.55,W:48,D:11,floors:14},
  {x:2,z:56,r:0.0,W:64,D:11,floors:11},
];
function groundMaps(){
  const c=document.createElement('canvas'); c.width=c.height=GS; const g=c.getContext('2d');
  const r=document.createElement('canvas'); r.width=r.height=GS; const gr=r.getContext('2d');
  g.fillStyle='#5d7a42'; g.fillRect(0,0,GS,GS); gr.fillStyle='#cfcfcf'; gr.fillRect(0,0,GS,GS);
  for(let i=0;i<30000;i++){ g.fillStyle='rgba('+(58+Math.random()*44|0)+','+(92+Math.random()*58|0)+','+(42+Math.random()*34|0)+','+(.07+Math.random()*.12).toFixed(2)+')';
    const s=Math.random()*3+1; g.fillRect(Math.random()*GS,Math.random()*GS,s,s); }
  const road=(x,y,w,h)=>{ g.fillStyle='#3b3e42'; g.fillRect(x,y,w,h); gr.fillStyle='#6a6a6a'; gr.fillRect(x,y,w,h); };
  const rw=w2c(11)-w2c(0);
  g.lineWidth=rw; g.strokeStyle='#3b3e42'; g.strokeRect(w2c(-95),w2c(-95),w2c(95)-w2c(-95),w2c(95)-w2c(-95));
  gr.lineWidth=rw; gr.strokeStyle='#6a6a6a'; gr.strokeRect(w2c(-95),w2c(-95),w2c(95)-w2c(-95),w2c(95)-w2c(-95));
  g.setLineDash([16,20]); g.strokeStyle='#d8d2c2'; g.lineWidth=2; g.strokeRect(w2c(-95),w2c(-95),w2c(95)-w2c(-95),w2c(95)-w2c(-95)); g.setLineDash([]);
  g.strokeStyle='#b6af9d'; g.lineWidth=w2c(3)-w2c(0); g.lineCap='round';
  gr.strokeStyle='#b0b0b0'; gr.lineWidth=w2c(3)-w2c(0); gr.lineCap='round';
  for(const p of positions){ g.beginPath();g.moveTo(w2c(0),w2c(0));g.lineTo(w2c(p.x),w2c(p.z));g.stroke();
    gr.beginPath();gr.moveTo(w2c(0),w2c(0));gr.lineTo(w2c(p.x),w2c(p.z));gr.stroke(); }
  g.fillStyle='#356b4e'; g.fillRect(w2c(-13),w2c(-11),w2c(13)-w2c(-13),w2c(11)-w2c(-11));
  g.strokeStyle='#e8e2d4'; g.lineWidth=3; g.strokeRect(w2c(-13),w2c(-11),w2c(13)-w2c(-13),w2c(11)-w2c(-11));
  g.beginPath();g.arc(w2c(0),w2c(0),w2c(4)-w2c(0),0,7);g.stroke();
  g.beginPath();g.moveTo(w2c(0),w2c(-11));g.lineTo(w2c(0),w2c(11));g.stroke();
  road(w2c(58),w2c(50),w2c(86)-w2c(58),w2c(80)-w2c(50));
  g.strokeStyle='#d8d2c2'; g.lineWidth=2; for(let i=0;i<=7;i++){const x=w2c(58)+(w2c(86)-w2c(58))*i/7;g.beginPath();g.moveTo(x,w2c(50));g.lineTo(x,w2c(80));g.stroke();}
  const t=tex(c,true), rt=tex(r); t.wrapS=t.wrapT=rt.wrapS=rt.wrapT=THREE.ClampToEdgeWrapping;
  return {map:t, rough:rt};
}
const gmaps=groundMaps();
const ground=new THREE.Mesh(new THREE.PlaneGeometry(GROUND,GROUND),
  new THREE.MeshStandardMaterial({map:gmaps.map, roughnessMap:gmaps.rough, roughness:1, metalness:0, envMapIntensity:0.6}));
ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

for(const p of positions){ const b=block(p); b.position.set(p.x,0,p.z); b.rotation.y=p.r; scene.add(b); }

// ---------- rain trees + palms ----------
const greens=[0x39632f,0x477a38,0x2f5628,0x548a3e];
const trunkMat=new THREE.MeshStandardMaterial({color:0x5a4530,roughness:1});
function rainTree(x,z,s=1){
  const g=new THREE.Group();
  const tr=new THREE.Mesh(new THREE.CylinderGeometry(0.35*s,0.75*s,5*s,8),trunkMat); tr.position.y=2.5*s; tr.castShadow=true; g.add(tr);
  for(let i=0;i<3;i++){ const a=i/3*Math.PI*2; const br=new THREE.Mesh(new THREE.CylinderGeometry(0.15*s,0.3*s,3.2*s,6),trunkMat);
    br.position.set(Math.cos(a)*1.4*s,4.4*s,Math.sin(a)*1.4*s); br.rotation.z=Math.cos(a)*0.6; br.rotation.x=Math.sin(a)*0.6; g.add(br); }
  for(let i=0;i<7;i++){ const cl=new THREE.Mesh(new THREE.IcosahedronGeometry(rand(2.6,4.2)*s,1),
      new THREE.MeshStandardMaterial({color:pick(greens),roughness:0.95,flatShading:true}));
    cl.position.set(rand(-4,4)*s, rand(5.6,7.0)*s, rand(-4,4)*s); cl.scale.set(1,0.55,1); cl.castShadow=true; g.add(cl); }
  g.position.set(x,0,z); return g;
}
function palm(x,z,s=1){
  const g=new THREE.Group();
  const tr=new THREE.Mesh(new THREE.CylinderGeometry(0.22*s,0.34*s,7.5*s,7),new THREE.MeshStandardMaterial({color:0x7a6142,roughness:1}));
  tr.position.y=3.75*s; tr.rotation.z=0.06; tr.castShadow=true; g.add(tr);
  for(let i=0;i<8;i++){ const a=i/8*Math.PI*2; const fr=new THREE.Mesh(new THREE.ConeGeometry(0.5*s,4.2*s,4),
      new THREE.MeshStandardMaterial({color:pick([0x3f7a3a,0x4f8a44]),roughness:0.9,flatShading:true,side:THREE.DoubleSide}));
    fr.position.set(Math.cos(a)*1.6*s,7.4*s,Math.sin(a)*1.6*s); fr.rotation.set(Math.PI/2.3*Math.sin(a),0,Math.PI/2.3*-Math.cos(a)); fr.castShadow=true; g.add(fr); }
  g.position.set(x,0,z); return g;
}
const spots=[[-72,-58],[70,-62],[-80,60],[76,66],[-16,-70],[20,72],[-70,2],[72,-8],[2,-60],[-42,64],[46,-10],[-8,32],[40,50],[-40,-50]];
spots.forEach(([x,z])=> scene.add(rainTree(x,z,rand(0.9,1.35))));

// ---------- lamps ----------
const lampHead=new THREE.MeshStandardMaterial({color:0xffe6b0,emissive:0xffca7a,emissiveIntensity:1.4});
function lamp(x,z){ const g=new THREE.Group();
  const p=new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.2,7,8),new THREE.MeshStandardMaterial({color:0x6a6f74,roughness:0.5,metalness:0.5})); p.position.y=3.5; p.castShadow=true; g.add(p);
  const h=new THREE.Mesh(new THREE.SphereGeometry(0.42,12,12),lampHead); h.position.y=7; g.add(h);
  g.position.set(x,0,z); return g; }
[[-20,-8],[22,-6],[-8,20],[16,18],[-30,40],[36,36],[0,-20],[-46,-2]].forEach(([x,z])=>scene.add(lamp(x,z)));

// ---------- cars ----------
function car(x,z,ry,col){ const g=new THREE.Group();
  const b=new THREE.Mesh(new THREE.BoxGeometry(2,0.9,4.4),new THREE.MeshStandardMaterial({color:col,roughness:0.28,metalness:0.5,envMapIntensity:1.2})); b.position.y=0.75; b.castShadow=true;
  const cab=new THREE.Mesh(new THREE.BoxGeometry(1.8,0.8,2.2),new THREE.MeshStandardMaterial({color:0x1b1f24,roughness:0.12,metalness:0.4,envMapIntensity:1.4})); cab.position.set(0,1.45,-0.2); cab.castShadow=true; g.add(b,cab);
  for(const [wx,wz] of[[-1,1.4],[1,1.4],[-1,-1.4],[1,-1.4]]){const w=new THREE.Mesh(new THREE.CylinderGeometry(0.42,0.42,0.3,12),darkMat); w.rotation.z=Math.PI/2; w.position.set(wx,0.42,wz); g.add(w);}
  g.position.set(x,0,z); g.rotation.y=ry; return g; }
const cc=[0xb43a2e,0xe8e6e2,0x24282e,0x35506e,0xb8b2a4,0x2f6b4a]; let k=0;
for(let i=0;i<6;i++) scene.add(car(rand(60,84),rand(52,78),Math.PI/2,cc[k++%cc.length]));

// ---------- playground blobs ----------
for(let i=0;i<5;i++){ const hh=rand(1.2,2.6); const b=new THREE.Mesh(new THREE.BoxGeometry(rand(1.2,2.2),hh,rand(1.2,2.2)),
  new THREE.MeshStandardMaterial({color:pick(ACCENTS),roughness:0.85})); b.position.set(rand(-7,7),hh/2,rand(-5,5)); b.castShadow=true; b.receiveShadow=true; scene.add(b); }

// ---------- post-processing ----------
const composer=new EffectComposer(renderer);
composer.setPixelRatio(Math.min(devicePixelRatio,2));
composer.setSize(innerWidth,innerHeight);
composer.addPass(new RenderPass(scene,camera));
let gtao=null;
const useAO=new URLSearchParams(location.search).has('ao');
if(useAO)try{
  gtao=new GTAOPass(scene,camera,innerWidth,innerHeight);
  gtao.output=GTAOPass.OUTPUT.Default;
  if(gtao.updateGtaoMaterial) gtao.updateGtaoMaterial({ radius:2.2, distanceExponent:1.0, thickness:1.0, scale:1.1, samples:16 });
  composer.addPass(gtao);
}catch(e){ console.warn('GTAO unavailable:', e.message); }
const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.24,0.5,0.9);
composer.addPass(bloom);
composer.addPass(new OutputPass());
composer.addPass(new SMAAPass(innerWidth,innerHeight));

addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); composer.setSize(innerWidth,innerHeight); });

const loadEl=document.getElementById('load'); let frames=0;
function animate(){ requestAnimationFrame(animate); controls.update(); composer.render();
  if(++frames===4){ loadEl.style.opacity='0'; setTimeout(()=>loadEl.remove(),700); } }
animate();
</script>
</body>
</html>

<script type="module">
import * as THREE from 'three';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { SMAAPass } from 'three/addons/postprocessing/SMAAPass.js';

const app=document.getElementById('app');
const renderer=new THREE.WebGLRenderer({antialias:false,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=0.72;
app.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color('#aeb8c0'); scene.fog=new THREE.FogExp2(0xc3ccd0,0.00035);
const camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.3,5000);

new RGBELoader().load('env.hdr',(hdr)=>{ hdr.mapping=THREE.EquirectangularReflectionMapping; scene.environment=hdr; scene.background=hdr; scene.backgroundBlurriness=0.03; scene.environmentIntensity=0.9; });

const sun=new THREE.DirectionalLight(0xfff1dd,2.4);
sun.position.set(50,120,60); sun.castShadow=true; sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=10; sun.shadow.camera.far=650; const sc=140; Object.assign(sun.shadow.camera,{left:-sc,right:sc,top:sc,bottom:-sc});
sun.shadow.bias=-0.0004; sun.shadow.normalBias=0.6; scene.add(sun);

const rand=(a,b)=>a+Math.random()*(b-a), pick=a=>a[(Math.random()*a.length)|0], TAU=Math.PI*2;
const updaters=[];
function tex(c,srgb=true){const t=new THREE.CanvasTexture(c);if(srgb)t.colorSpace=THREE.SRGBColorSpace;t.anisotropy=8;return t;}
function stripeTex(a,b,n=10){const c=document.createElement('canvas');c.width=n*28;c.height=28;const g=c.getContext('2d');for(let i=0;i<n;i++){g.fillStyle=i%2?a:b;g.fillRect(i*28,0,28,28);}const t=tex(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;return t;}
function strut(p1,p2,r,mat){const d=new THREE.Vector3().subVectors(p2,p1),len=d.length();const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,len,8),mat);m.position.copy(p1).addScaledVector(d,0.5);m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),d.clone().normalize());m.castShadow=true;return m;}
const metalMat=new THREE.MeshStandardMaterial({color:0xd8d8d6,roughness:0.4,metalness:0.6});
const brass=new THREE.MeshStandardMaterial({color:0xd8b24a,roughness:0.35,metalness:0.6});
const RIDE=[0xe23b2e,0x2f7fc0,0xf0b429,0x37a06b,0xc85a9a,0xf0f0ea];

// circular colliders (avatar can't walk through ride bases)
const circles=[];
function collides(x,z){ for(const c of circles){ if((x-c.x)**2+(z-c.z)**2 < c.r*c.r) return true; } return false; }

// ---------- Ferris wheel ----------
function ferris(x,z){
  const g=new THREE.Group(); g.position.set(x,0,z); const R=17, cy=R+3.5;
  const spin=new THREE.Group(); spin.position.y=cy; g.add(spin);
  for(const zz of [-1.6,1.6]){ const rim=new THREE.Mesh(new THREE.TorusGeometry(R,0.3,10,60),metalMat); rim.position.z=zz; spin.add(rim); }
  const N=14;
  for(let i=0;i<N;i++){ const a=i/N*TAU; const sp=new THREE.Mesh(new THREE.CylinderGeometry(0.09,0.09,R,6),metalMat); sp.position.set(Math.cos(a)*R/2,Math.sin(a)*R/2,0); sp.rotation.z=a-Math.PI/2; spin.add(sp); }
  const hub=new THREE.Mesh(new THREE.CylinderGeometry(1,1,3.8,14),metalMat); hub.rotation.x=Math.PI/2; spin.add(hub);
  const gond=[];
  for(let i=0;i<N;i++){ const a=i/N*TAU; const piv=new THREE.Group(); piv.position.set(Math.cos(a)*R,Math.sin(a)*R,0); spin.add(piv);
    const cab=new THREE.Mesh(new THREE.BoxGeometry(2.4,1.9,3),new THREE.MeshStandardMaterial({color:RIDE[i%RIDE.length],roughness:0.5,metalness:0.2})); cab.position.y=-1.7; cab.castShadow=true;
    const roof=new THREE.Mesh(new THREE.ConeGeometry(1.9,0.9,4),metalMat); roof.position.y=-0.4; roof.rotation.y=Math.PI/4; piv.add(cab,roof); gond.push(piv); }
  const legMat=metalMat;
  for(const zz of [-6,6]){ g.add(strut(new THREE.Vector3(-11,0,zz),new THREE.Vector3(0,cy,zz>0?1.6:-1.6),0.45,legMat)); g.add(strut(new THREE.Vector3(11,0,zz),new THREE.Vector3(0,cy,zz>0?1.6:-1.6),0.45,legMat)); }
  circles.push({x,z,r:12});
  updaters.push((t,dt)=>{ spin.rotation.z+=dt*0.22; gond.forEach(p=>p.rotation.z=-spin.rotation.z); });
  return g;
}

// ---------- Carousel ----------
function horse(col){ const g=new THREE.Group(); const m=new THREE.MeshStandardMaterial({color:col,roughness:0.5});
  const body=new THREE.Mesh(new THREE.CapsuleGeometry(0.5,1.4,4,8),m); body.rotation.z=Math.PI/2; body.position.y=1.3; body.castShadow=true;
  const neck=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.4,1.1,8),m); neck.position.set(0.9,1.9,0); neck.rotation.z=-0.5;
  const head=new THREE.Mesh(new THREE.BoxGeometry(0.9,0.45,0.4),m); head.position.set(1.4,2.3,0);
  for(const [dx,dz] of [[-0.6,0.3],[-0.6,-0.3],[0.6,0.3],[0.6,-0.3]]){ const leg=new THREE.Mesh(new THREE.CylinderGeometry(0.13,0.13,1.3,6),m); leg.position.set(dx,0.65,dz); leg.castShadow=true; g.add(leg); }
  g.add(body,neck,head); return g; }
function carousel(x,z){
  const g=new THREE.Group(); g.position.set(x,0,z); const spin=new THREE.Group(); g.add(spin);
  const plat=new THREE.Mesh(new THREE.CylinderGeometry(7,7.4,0.7,40),new THREE.MeshStandardMaterial({color:0xe9dcc4,roughness:0.8})); plat.position.y=0.55; plat.castShadow=plat.receiveShadow=true; spin.add(plat);
  const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.55,0.55,6.4,14),brass); pole.position.y=3.8; g.add(pole);
  const roof=new THREE.Mesh(new THREE.ConeGeometry(8,3,40,1,false),new THREE.MeshStandardMaterial({map:stripeTex('#e23b2e','#f4ede0',20),roughness:0.6})); roof.position.y=7.4; roof.castShadow=true; spin.add(roof);
  const trim=new THREE.Mesh(new THREE.TorusGeometry(8,0.25,8,40),brass); trim.rotation.x=Math.PI/2; trim.position.y=5.9; spin.add(trim);
  const horses=[]; const N=8;
  for(let i=0;i<N;i++){ const a=i/N*TAU; const hp=new THREE.Group(); hp.position.set(Math.cos(a)*5,0.9,Math.sin(a)*5); hp.rotation.y=-a+Math.PI/2; spin.add(hp);
    const bar=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,5,8),brass); bar.position.y=2.8; hp.add(bar);
    const h=horse(RIDE[i%RIDE.length]); hp.add(h); horses.push({h,ph:i}); }
  circles.push({x,z,r:8});
  updaters.push((t,dt)=>{ spin.rotation.y+=dt*0.5; horses.forEach((o,i)=>{ o.h.position.y=Math.sin(t*2.2+i*0.8)*0.35; }); });
  return g;
}

// ---------- Roller coaster ----------
function coaster(x,z){
  const g=new THREE.Group(); g.position.set(x,0,z);
  const pts=[]; const NP=12;
  for(let i=0;i<NP;i++){ const a=i/NP*TAU; pts.push(new THREE.Vector3(Math.cos(a)*20, Math.max(1.6, 6+Math.sin(a*2)*6+Math.sin(a*3)*2), Math.sin(a)*13)); }
  const curve=new THREE.CatmullRomCurve3(pts,true,'catmullrom',0.5);
  const tube=new THREE.Mesh(new THREE.TubeGeometry(curve,240,0.34,8,true),new THREE.MeshStandardMaterial({color:0xff5a3c,roughness:0.45,metalness:0.35})); tube.castShadow=true; g.add(tube);
  // two rails + ties for readability
  const railMat=new THREE.MeshStandardMaterial({color:0xe8e6e2,roughness:0.4,metalness:0.5});
  const supMat=new THREE.MeshStandardMaterial({color:0xcf7a3a,roughness:0.7});
  for(let i=0;i<60;i++){ const p=curve.getPointAt(i/60); if(p.y>2.2) g.add(strut(new THREE.Vector3(p.x,0,p.z),new THREE.Vector3(p.x,p.y-0.3,p.z),0.16,supMat)); }
  const cars=[]; const carCol=[0xf0b429,0xe23b2e,0x2f7fc0,0x37a06b];
  for(let i=0;i<4;i++){ const c=new THREE.Group(); const b=new THREE.Mesh(new THREE.BoxGeometry(1.4,1,1.9),new THREE.MeshStandardMaterial({color:carCol[i],roughness:0.4,metalness:0.3})); b.position.y=0.5; b.castShadow=true; const nose=new THREE.Mesh(new THREE.SphereGeometry(0.6,10,8),new THREE.MeshStandardMaterial({color:carCol[i],roughness:0.4})); nose.position.set(0,0.5,1); nose.scale.z=0.7; c.add(b,nose); g.add(c); cars.push(c); }
  circles.push({x,z,r:6});
  let tt=0; const up=new THREE.Vector3(0,1,0);
  updaters.push((t,dt)=>{ tt=(tt+dt*0.045)%1; cars.forEach((c,i)=>{ const u=(tt - i*0.012 +1)%1; const p=curve.getPointAt(u), tan=curve.getTangentAt(u); c.position.copy(p).addScaledVector(up,0.45); c.lookAt(p.clone().add(tan).addScaledVector(up,0.45)); }); });
  return g;
}

// ---------- decor ----------
function tent(x,z,a,b){ const g=new THREE.Group(); g.position.set(x,0,z);
  const roof=new THREE.Mesh(new THREE.ConeGeometry(3.2,2.4,4,1,false),new THREE.MeshStandardMaterial({map:stripeTex(a,b,8),roughness:0.7})); roof.position.y=3.2; roof.rotation.y=Math.PI/4; roof.castShadow=true;
  const base=new THREE.Mesh(new THREE.BoxGeometry(4.2,2,4.2),new THREE.MeshStandardMaterial({color:0xe6dbc6,roughness:0.8})); base.position.y=1; base.castShadow=base.receiveShadow=true;
  const counter=new THREE.Mesh(new THREE.BoxGeometry(4.4,0.9,0.5),new THREE.MeshStandardMaterial({color:b,roughness:0.6})); counter.position.set(0,0.9,2.1);
  g.add(roof,base,counter); circles.push({x,z,r:2.8}); return g; }
function booth(x,z,col){ const g=new THREE.Group(); g.position.set(x,0,z);
  const b=new THREE.Mesh(new THREE.BoxGeometry(3,3,3),new THREE.MeshStandardMaterial({color:0xe4d9c3,roughness:0.85})); b.position.y=1.5; b.castShadow=b.receiveShadow=true;
  const roof=new THREE.Mesh(new THREE.ConeGeometry(2.6,1.2,4),new THREE.MeshStandardMaterial({color:col,roughness:0.6})); roof.position.y=3.6; roof.rotation.y=Math.PI/4; roof.castShadow=true;
  const awn=new THREE.Mesh(new THREE.BoxGeometry(3.2,0.1,1.1),new THREE.MeshStandardMaterial({map:stripeTex(col,'#f4ede0',8),roughness:0.6})); awn.position.set(0,2.2,1.9); awn.rotation.x=0.25;
  g.add(b,roof,awn); circles.push({x,z,r:2.2}); return g; }
function balloons(x,z){ const g=new THREE.Group(); g.position.set(x,0,z);
  const cart=new THREE.Mesh(new THREE.BoxGeometry(1.6,1,1),new THREE.MeshStandardMaterial({color:0x8a5a33,roughness:0.8})); cart.position.y=0.7; cart.castShadow=true; g.add(cart);
  const bs=[]; for(let i=0;i<12;i++){ const col=RIDE[i%RIDE.length]; const b=new THREE.Mesh(new THREE.SphereGeometry(0.4,12,12),new THREE.MeshStandardMaterial({color:col,roughness:0.35})); b.scale.y=1.25; const bx=rand(-0.7,0.7),bz=rand(-0.6,0.6),by=rand(2.6,3.8); b.position.set(bx,by,bz); g.add(b); g.add(strut(new THREE.Vector3(bx*0.2,1.1,bz*0.2),new THREE.Vector3(bx,by-0.5,bz),0.015,new THREE.MeshStandardMaterial({color:0x444}))); bs.push({b,bx,bz,by,ph:i}); }
  updaters.push((t)=>{ bs.forEach(o=>{ o.b.position.x=o.bx+Math.sin(t*1.1+o.ph)*0.1; o.b.position.y=o.by+Math.sin(t*0.9+o.ph)*0.12; }); });
  circles.push({x,z,r:1.4}); return g; }
// string lights between poles along a path
function stringLights(pts){ const g=new THREE.Group(); const poleMat=new THREE.MeshStandardMaterial({color:0x6a6f74,roughness:0.5,metalness:0.4});
  const bulbMat=new THREE.MeshStandardMaterial({color:0xfff3d0,emissive:0xffd48a,emissiveIntensity:0.6});
  for(const p of pts){ const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.16,6,8),poleMat); pole.position.set(p.x,3,p.z); pole.castShadow=true; g.add(pole); }
  for(let i=0;i<pts.length-1;i++){ const a=pts[i],b=pts[i+1]; const seg=14; for(let s=0;s<=seg;s++){ const u=s/seg; const x=a.x+(b.x-a.x)*u, z=a.z+(b.z-a.z)*u; const sag=Math.sin(u*Math.PI)*1.2; const y=6 - sag; if(s%2===0){ const bulb=new THREE.Mesh(new THREE.SphereGeometry(0.13,8,8),bulbMat); bulb.position.set(x,y,z); g.add(bulb); } } }
  return g; }
function bench(x,z,a){ const g=new THREE.Group(); g.position.set(x,0,z); g.rotation.y=a; const m=new THREE.MeshStandardMaterial({color:0x9a6b3f,roughness:0.8});
  const seat=new THREE.Mesh(new THREE.BoxGeometry(2.4,0.16,0.7),m); seat.position.y=0.6; seat.castShadow=true; const back=new THREE.Mesh(new THREE.BoxGeometry(2.4,0.7,0.14),m); back.position.set(0,0.95,-0.28); g.add(seat,back); return g; }
function tree(x,z,s=1){ const g=new THREE.Group(); g.position.set(x,0,z); const tr=new THREE.Mesh(new THREE.CylinderGeometry(0.3*s,0.6*s,4*s,7),new THREE.MeshStandardMaterial({color:0x6a4b2f,roughness:1})); tr.position.y=2*s; tr.castShadow=true; g.add(tr);
  for(let i=0;i<5;i++){ const cl=new THREE.Mesh(new THREE.IcosahedronGeometry(rand(1.8,2.8)*s,1),new THREE.MeshStandardMaterial({color:pick([0x3f7a3a,0x4f8a44,0x357a3f]),roughness:0.95,flatShading:true})); cl.position.set(rand(-1.6,1.6)*s,rand(4,5.4)*s,rand(-1.6,1.6)*s); cl.castShadow=true; g.add(cl); } return g; }

// ---------- vendors ----------
function foodCart(x,z,a,col){ const g=new THREE.Group(); g.position.set(x,0,z); g.rotation.y=a;
  const cart=new THREE.Mesh(new THREE.BoxGeometry(2.6,1.2,1.4),new THREE.MeshStandardMaterial({color:0xefe7d7,roughness:0.8})); cart.position.y=0.9; cart.castShadow=true;
  const stripe=new THREE.Mesh(new THREE.BoxGeometry(2.64,0.42,1.44),new THREE.MeshStandardMaterial({color:col,roughness:0.7})); stripe.position.y=1.36;
  const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.06,3.2,6),new THREE.MeshStandardMaterial({color:0x8a8f94,roughness:0.5,metalness:0.4})); pole.position.y=2.5;
  const para=new THREE.Mesh(new THREE.ConeGeometry(2.3,0.95,12,1,false),new THREE.MeshStandardMaterial({map:stripeTex(col,'#f4ede0',12),roughness:0.7,side:THREE.DoubleSide})); para.position.y=3.7; para.castShadow=true;
  const board=new THREE.Mesh(new THREE.BoxGeometry(1.2,0.85,0.08),new THREE.MeshStandardMaterial({color:0x2a2620,roughness:0.7})); board.position.set(0,2.05,0.76);
  const wheelL=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,0.16,12),new THREE.MeshStandardMaterial({color:0x333})); wheelL.rotation.x=Math.PI/2; wheelL.position.set(-1,0.4,0.7);
  const wheelR=wheelL.clone(); wheelR.position.x=1;
  g.add(cart,stripe,pole,para,board,wheelL,wheelR); circles.push({x,z,r:2.1}); return g; }

// ---------- ground (real photo grass + paved plaza + paths) ----------
const GROUND=280, GS=2048, w2c=x=>(x+GROUND/2)/GROUND*GS;
const rideSpots={ferris:[0,-48],carousel:[-32,-6],coaster:[36,-16]};
function loadImg(s){return new Promise((r,j)=>{const i=new Image();i.onload=()=>r(i);i.onerror=j;i.src=s;});}
function groundTex(grass){ const c=document.createElement('canvas'); c.width=c.height=GS; const g=c.getContext('2d');
  g.fillStyle=g.createPattern(grass,'repeat'); g.fillRect(0,0,GS,GS);
  g.globalCompositeOperation='color'; g.fillStyle='rgba(80,128,58,0.5)'; g.fillRect(0,0,GS,GS);
  g.globalCompositeOperation='soft-light'; g.fillStyle='rgba(40,80,30,0.35)'; g.fillRect(0,0,GS,GS); g.globalCompositeOperation='source-over';
  // central plaza
  g.fillStyle='#cdbfa6'; g.beginPath(); g.arc(w2c(0),w2c(0),w2c(16)-w2c(0),0,TAU); g.fill();
  g.strokeStyle='#b7a98c'; g.lineWidth=3; for(let r=4;r<16;r+=4){ g.beginPath(); g.arc(w2c(0),w2c(0),w2c(r)-w2c(0),0,TAU); g.stroke(); }
  // paths to rides + entrance
  const path=(x,z)=>{ g.strokeStyle='#cdbfa6'; g.lineWidth=w2c(5)-w2c(0); g.lineCap='round'; g.beginPath(); g.moveTo(w2c(0),w2c(0)); g.lineTo(w2c(x),w2c(z)); g.stroke(); };
  path(0,-48); path(-32,-6); path(36,-16); path(0,46);
  const t=tex(c); t.wrapS=t.wrapT=THREE.ClampToEdgeWrapping; return t; }

// ---------- avatar (reused) ----------
const char=new THREE.Group();
const skin=new THREE.MeshStandardMaterial({color:0xe3b48c,roughness:0.8}), shirt=new THREE.MeshStandardMaterial({color:0x2f7fc0,roughness:0.7}), pants=new THREE.MeshStandardMaterial({color:0x33404f,roughness:0.8});
const torso=new THREE.Mesh(new THREE.CapsuleGeometry(0.42,0.8,4,10),shirt); torso.position.y=1.55; torso.castShadow=true;
const head=new THREE.Mesh(new THREE.SphereGeometry(0.34,16,16),skin); head.position.y=2.35; head.castShadow=true;
const hair=new THREE.Mesh(new THREE.SphereGeometry(0.355,16,16,0,TAU,0,Math.PI*0.6),new THREE.MeshStandardMaterial({color:0x1c1712,roughness:1})); hair.position.y=2.38;
const mkLimb=(mat,len,w)=>{const m=new THREE.Mesh(new THREE.BoxGeometry(w,len,w),mat);m.position.y=-len/2;m.castShadow=true;return m;};
const legL=new THREE.Group(),legR=new THREE.Group(),armL=new THREE.Group(),armR=new THREE.Group();
legL.add(mkLimb(pants,0.85,0.26)); legL.position.set(-0.2,0.85,0); legR.add(mkLimb(pants,0.85,0.26)); legR.position.set(0.2,0.85,0);
armL.add(mkLimb(shirt,0.78,0.2)); armL.position.set(-0.55,2.0,0); armR.add(mkLimb(shirt,0.78,0.2)); armR.position.set(0.55,2.0,0);
char.add(torso,head,hair,legL,legR,armL,armR); char.position.set(0,0,54); scene.add(char);
let charYaw=0, walkPhase=0;

// ---------- input (reused) ----------
const keys={}; addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true); addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
let camYaw=0, camPitch=0.30, camDist=15;
const joy=document.getElementById('joy'), knob=document.getElementById('knob'); let joyId=null,joyC={x:0,y:0},joyVec={x:0,y:0}; const cv=renderer.domElement;
const camPts=new Map(); let pinchLast=null, lookLast=null;
const clampPitch=v=>Math.max(-0.05,Math.min(1.3,v));
const refreshCam=()=>{ if(camPts.size===1){const p=[...camPts.values()][0];lookLast={x:p.x,y:p.y};} else lookLast=null; if(camPts.size===2){const a=[...camPts.values()];pinchLast=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);} else pinchLast=null; };
cv.addEventListener('touchstart',e=>{for(const t of e.changedTouches){ if(t.clientX<innerWidth*0.5&&joyId===null){joyId=t.identifier;joyC={x:t.clientX,y:t.clientY};joy.style.display='block';joy.style.left=t.clientX+'px';joy.style.top=t.clientY+'px';knob.style.left='50%';knob.style.top='50%';document.getElementById('tip').style.display='none';} else {camPts.set(t.identifier,{x:t.clientX,y:t.clientY});} } refreshCam(); },{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches){ if(t.identifier===joyId){let dx=t.clientX-joyC.x,dy=t.clientY-joyC.y;const R=52,d=Math.hypot(dx,dy);if(d>R){dx=dx/d*R;dy=dy/d*R;}knob.style.left=(60+dx)+'px';knob.style.top=(60+dy)+'px';joyVec.x=dx/R;joyVec.y=dy/R;} else if(camPts.has(t.identifier)){camPts.set(t.identifier,{x:t.clientX,y:t.clientY});} }
  if(camPts.size===1&&lookLast){const p=[...camPts.values()][0];camYaw-=(p.x-lookLast.x)*0.006;camPitch=clampPitch(camPitch+(p.y-lookLast.y)*0.005);lookLast={x:p.x,y:p.y};}
  else if(camPts.size===2){const a=[...camPts.values()];const d=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);if(pinchLast!=null)camDist=Math.max(6,Math.min(48,camDist-(d-pinchLast)*0.05));pinchLast=d;} },{passive:false});
const tEnd=e=>{for(const t of e.changedTouches){if(t.identifier===joyId){joyId=null;joyVec.x=joyVec.y=0;joy.style.display='none';}else camPts.delete(t.identifier);} refreshCam(); };
cv.addEventListener('touchend',tEnd); cv.addEventListener('touchcancel',tEnd);
let md=false,mLast=null; cv.addEventListener('mousedown',e=>{md=true;mLast={x:e.clientX,y:e.clientY};}); addEventListener('mouseup',()=>md=false);
addEventListener('mousemove',e=>{if(!md)return;camYaw-=(e.clientX-mLast.x)*0.005;camPitch=clampPitch(camPitch+(e.clientY-mLast.y)*0.004);mLast={x:e.clientX,y:e.clientY};});
addEventListener('wheel',e=>{camDist=Math.max(6,Math.min(40,camDist+e.deltaY*0.02));},{passive:true});
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);});

const composer=new EffectComposer(renderer); composer.setPixelRatio(Math.min(devicePixelRatio,2)); composer.setSize(innerWidth,innerHeight);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.15,0.5,0.98));
composer.addPass(new OutputPass()); composer.addPass(new SMAAPass(innerWidth,innerHeight));

// ---------- build ----------
loadImg('grass_512.jpg').then(grass=>{
  const ground=new THREE.Mesh(new THREE.PlaneGeometry(GROUND,GROUND),new THREE.MeshStandardMaterial({map:groundTex(grass),roughness:0.95,metalness:0,envMapIntensity:0.5}));
  ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);
  scene.add(ferris(0,-48)); scene.add(carousel(-32,-6)); scene.add(coaster(36,-16));
  scene.add(tent(-14,14,'#e23b2e','#f4ede0')); scene.add(tent(14,14,'#2f7fc0','#f4ede0')); scene.add(tent(20,2,'#37a06b','#f4ede0'));
  scene.add(booth(-20,4,0xf0b429)); scene.add(booth(-8,20,0xc85a9a)); scene.add(booth(10,22,0xe23b2e));
  scene.add(balloons(6,10)); scene.add(balloons(-12,-2));
  scene.add(stringLights([new THREE.Vector3(-6,0,44),new THREE.Vector3(-5,0,30),new THREE.Vector3(-4,0,16)]));
  scene.add(stringLights([new THREE.Vector3(6,0,44),new THREE.Vector3(5,0,30),new THREE.Vector3(4,0,16)]));
  for(const [x,z] of [[-10,34],[12,34],[-24,24],[24,20],[-28,36],[30,32]]) scene.add(bench(x,z,rand(0,TAU)));
  for(const [x,z] of [[-60,-30],[62,-40],[-64,30],[66,34],[-24,-64],[26,-60],[-70,4],[70,6],[-44,50],[48,48],[0,-78],[-20,60],[22,60]]) scene.add(tree(x,z,rand(0.9,1.4)));
    // ---- vendors + game stalls (busier park) ----
  scene.add(foodCart(-16,26,0.3,0xe23b2e)); scene.add(foodCart(15,28,-0.4,0x2f7fc0)); scene.add(foodCart(24,10,-1.2,0xf0b429));
  scene.add(foodCart(-24,14,0.9,0x37a06b)); scene.add(foodCart(4,-2,3.0,0xc85a9a));
  scene.add(booth(-16,-16,0x6a5acd)); scene.add(booth(18,-24,0xe0822a)); scene.add(booth(-26,-6,0x2a9d8f));
  scene.add(tent(28,-4,'#f0b429','#f4ede0')); scene.add(tent(-22,-24,'#c85a9a','#f4ede0'));

  // ---- CROWD (instanced) + QUEUES with barrier ropes ----
  const shirtCols=[0xd8443a,0x2f7fc0,0xf0b429,0x37a06b,0xc85a9a,0xe0822a,0x6a5acd,0xe8e6e2,0x2a9d8f,0x8a5a8f];
  const CROWD=104;
  const cBodies=new THREE.InstancedMesh(new THREE.CapsuleGeometry(0.3,0.66,4,8),new THREE.MeshStandardMaterial({roughness:0.75}),CROWD);
  const cHeads=new THREE.InstancedMesh(new THREE.SphereGeometry(0.25,10,10),new THREE.MeshStandardMaterial({color:0xe3b48c,roughness:0.85}),CROWD);
  cBodies.castShadow=true; cBodies.frustumCulled=false; cHeads.frustumCulled=false;
  const agents=[];
  const queueDefs=[ {ex:0,ez:-34,dx:0,dz:1,n:14,len:17}, {ex:-32,ez:3,dx:0,dz:1,n:11,len:13}, {ex:36,ez:-8,dx:0,dz:1,n:11,len:13} ];
  const postMat=new THREE.MeshStandardMaterial({color:0xb2b6ba,roughness:0.4,metalness:0.6});
  const capMat=new THREE.MeshStandardMaterial({color:0xd8b24a,metalness:0.6,roughness:0.3});
  const ropeMat=new THREE.MeshStandardMaterial({color:0x9a2f2f,roughness:0.6});
  for(const q of queueDefs){
    const half=0.95, steps=Math.max(2,Math.round(q.len/2.4));
    for(const side of [-half,half]){ let prev=null;
      for(let s=0;s<=steps;s++){ const dist=s/steps*q.len; const px=q.ex+q.dx*dist - q.dz*side; const pz=q.ez+q.dz*dist + q.dx*side;
        const post=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,1,6),postMat); post.position.set(px,0.5,pz); scene.add(post);
        const cap=new THREE.Mesh(new THREE.SphereGeometry(0.09,8,8),capMat); cap.position.set(px,1.02,pz); scene.add(cap);
        if(prev) scene.add(strut(new THREE.Vector3(prev.x,0.84,prev.z),new THREE.Vector3(px,0.84,pz),0.025,ropeMat));
        prev={x:px,z:pz}; } }
  }
  let ai=0;
  for(let qi=0; qi<queueDefs.length; qi++){ const q=queueDefs[qi]; for(let k=0;k<q.n;k++){ agents.push({mode:'q',q,p:k/q.n,phase:Math.random()*6}); ai++; } }
  for(; ai<CROWD; ai++){ const x=rand(-70,70),z=rand(-72,72); agents.push({mode:'w',x,z,tx:x,tz:z,phase:Math.random()*6,spd:rand(1.3,2.6)}); }
  for(let i=0;i<CROWD;i++) cBodies.setColorAt(i,new THREE.Color(pick(shirtCols)));
  cBodies.instanceColor.needsUpdate=true; scene.add(cBodies,cHeads);
  const dummy=new THREE.Object3D();
  const newTarget=a=>{ for(let tr=0;tr<6;tr++){ const x=rand(-72,72),z=rand(-72,72); let ok=true; for(const c of circles){ if((x-c.x)**2+(z-c.z)**2<(c.r+2)*(c.r+2)){ok=false;break;} } if(ok){a.tx=x;a.tz=z;return;} } a.tx=rand(-40,40); a.tz=rand(24,64); };
  updaters.push((t,dt)=>{
    for(let i=0;i<CROWD;i++){ const a=agents[i]; let x,z,fy;
      if(a.mode==='q'){ a.p+=dt*0.017; if(a.p>1)a.p-=1; const dist=a.q.len*(1-a.p); x=a.q.ex+a.q.dx*dist; z=a.q.ez+a.q.dz*dist; fy=Math.atan2(-a.q.dx,-a.q.dz); }
      else { const dx=a.tx-a.x,dz=a.tz-a.z,d=Math.hypot(dx,dz); if(d<1.2) newTarget(a); else { const s=Math.min(1,a.spd*dt/d); a.x+=dx*s; a.z+=dz*s; } x=a.x; z=a.z; fy=Math.atan2(dx,dz); }
      const bob=Math.abs(Math.sin(a.phase+t*3.2))*0.05;
      dummy.rotation.set(0,fy,0); dummy.position.set(x,0.75+bob,z); dummy.updateMatrix(); cBodies.setMatrixAt(i,dummy.matrix);
      dummy.position.set(x,1.5+bob,z); dummy.updateMatrix(); cHeads.setMatrixAt(i,dummy.matrix); }
    cBodies.instanceMatrix.needsUpdate=true; cHeads.instanceMatrix.needsUpdate=true;
  });

  const l=document.getElementById('load'); l.style.opacity='0'; setTimeout(()=>l.remove(),700);
});
// Blender-authored hero arch at the entrance (loaded if present)
new GLTFLoader().load('arch.glb',(gltf)=>{ const a=gltf.scene; a.position.set(0,0,49); a.traverse(o=>{if(o.isMesh){o.castShadow=true;o.receiveShadow=true;}}); scene.add(a); }, undefined, ()=>console.log('arch.glb not loaded (optional)'));

// ---------- loop ----------
const SPEED=8.5, clock=new THREE.Clock();
function animate(){ requestAnimationFrame(animate);
  const dt=Math.min(0.05,clock.getDelta()), t=clock.elapsedTime;
  let ix=0,iz=0;
  if(keys['w']||keys['arrowup'])iz+=1; if(keys['s']||keys['arrowdown'])iz-=1; if(keys['a']||keys['arrowleft'])ix-=1; if(keys['d']||keys['arrowright'])ix+=1;
  ix+=joyVec.x; iz+=-joyVec.y;
  const fwdX=-Math.sin(camYaw),fwdZ=-Math.cos(camYaw),rgtX=Math.cos(camYaw),rgtZ=-Math.sin(camYaw);
  let mx=fwdX*iz+rgtX*ix,mz=fwdZ*iz+rgtZ*ix; const ml=Math.hypot(mx,mz); const moving=ml>0.05;
  if(moving){ mx/=ml; mz/=ml; let nx=char.position.x+mx*SPEED*dt, nz=char.position.z+mz*SPEED*dt; nx=Math.max(-110,Math.min(110,nx)); nz=Math.max(-110,Math.min(110,nz));
    if(!collides(nx,char.position.z)) char.position.x=nx; if(!collides(char.position.x,nz)) char.position.z=nz;
    const tg=Math.atan2(mx,mz); let d=tg-charYaw; while(d>Math.PI)d-=TAU; while(d<-Math.PI)d+=TAU; charYaw+=d*Math.min(1,dt*12); walkPhase+=dt*SPEED*1.1; }
  char.rotation.y=charYaw; const sw=moving?Math.sin(walkPhase)*0.6:0;
  legL.rotation.x=sw; legR.rotation.x=-sw; armL.rotation.x=-sw*0.8; armR.rotation.x=sw*0.8; torso.position.y=1.55+(moving?Math.abs(Math.sin(walkPhase))*0.04:0);
  const off=new THREE.Vector3(Math.sin(camYaw)*Math.cos(camPitch),Math.sin(camPitch),Math.cos(camYaw)*Math.cos(camPitch)).multiplyScalar(camDist);
  camera.position.lerp(new THREE.Vector3(char.position.x,char.position.y+2,char.position.z).add(off),0.16);
  const lookUp=Math.max(0,(0.38-camPitch))*22;
  camera.lookAt(char.position.x,char.position.y+1.8+lookUp,char.position.z);
  for(const u of updaters) u(t,dt);
  composer.render();
}
animate();
</script>

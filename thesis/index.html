<style>

*{box-sizing:border-box;margin:0;padding:0}

.serif{font-family:var(--serif)}
.mono{font-family:var(--mono)}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 20px}

.flag-w{background:rgba(192,132,24,.08);border:1px solid rgba(192,132,24,.3);color:#8a6010;border-radius:9px;padding:10px 13px;font-size:12.5px;font-weight:600;margin:12px 0;line-height:1.5}
.sect{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);margin:24px 0 11px}
.facrow{display:flex;align-items:center;gap:11px;margin:9px 0}
.facrow .fl{width:118px;font-size:12.5px;color:var(--ink2);flex:none}
.facrow .ft{flex:1;height:8px;border-radius:5px;background:var(--panel2);overflow:hidden}
.facrow .ft i{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,var(--green-d),var(--green))}
.facrow .fv{width:30px;text-align:right;font-family:var(--mono);font-size:12px;color:var(--ink2);flex:none}
.facrow .fw{width:38px;text-align:right;font-size:10px;color:var(--ink3);flex:none}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mc{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px 13px}
.mc .k{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink3);font-weight:700}
.mc .v{font-family:var(--mono);font-size:16px;font-weight:600;margin-top:4px;color:var(--ink)}
.mc .v small{font-size:11px;color:var(--ink3);font-family:var(--sans)}
.tvbtn{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--green);background:rgba(31,193,143,.08);border:1px solid rgba(31,193,143,.28);border-radius:9px;padding:9px 13px;margin-top:18px}
.addcmp{font-size:12px;font-weight:600;color:var(--gold);border:1px solid rgba(205,166,78,.35);border-radius:8px;padding:8px 12px;margin-top:18px;margin-left:9px}
/* panel */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow)}
.panel h2{font-family:var(--serif);font-size:18px;font-weight:600;display:flex;align-items:center;gap:9px;margin-bottom:6px}
.panel .note{font-size:13px;color:var(--ink2);line-height:1.6}
.pill{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--ink3);border:1px solid var(--line2);border-radius:999px;padding:3px 9px}
.assess{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px}
.assess.ok{background:rgba(15,157,118,.12);color:#0b7d5e}
.assess.mid{background:rgba(58,127,192,.11);color:#2f6aa6}
.assess.hi{background:rgba(192,132,24,.12);color:#9a6a10}
.assess.steep{background:rgba(207,83,73,.11);color:#b33f36}
.lstat{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:30px;white-space:nowrap}
.lstat.act{background:rgba(15,157,118,.13);color:#0b7d5e}
.lstat.sel{background:rgba(58,127,192,.11);color:#2f6aa6}
.lstat.sold{background:var(--panel2);color:var(--ink3)}
.sub-r{font-size:10px;color:var(--ink3);font-weight:400;margin-top:2px;font-family:var(--sans)}
/* launch radar feed */
.up-chips{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:20px 0 4px}
.up-chip{font-size:12.5px;font-weight:600;color:var(--ink2);background:var(--panel);border:1px solid var(--line);border-radius:30px;padding:8px 14px;transition:.15s}
.up-chip:hover{border-color:var(--green-d)}
.up-chip.on{background:var(--green);color:#fff;border-color:var(--green)}
.up-count{margin-left:auto;font-size:11.5px;color:var(--ink3);font-weight:600}
.launch-feed{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0}
.lcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);transition:.15s}
.lcard:hover{border-color:var(--line2);box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.lc-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px}
.lc-name{font-family:var(--serif);font-size:18px;font-weight:600;line-height:1.15;flex:1}
.lc-name small{display:block;font-family:var(--sans);font-size:11px;color:var(--ink3);font-weight:500;margin-top:3px}
.lc-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:11px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.lc-k{font-size:9.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink3);font-weight:700}
.lc-v{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--ink);margin-top:3px}
.lc-take{font-size:12.5px;color:var(--ink2);line-height:1.5;margin-top:11px}

@media(max-width:420px){.lc-row{grid-template-columns:1fr 1fr;gap:8px 12px}}
.lc-comps{font-size:10.5px;color:var(--ink3);line-height:1.6;margin-top:10px;border-top:1px dashed var(--line);padding-top:9px}
.lc-comps b{color:var(--ink2);font-weight:700}.lc-comps .cmp-psf{font-family:var(--mono);color:var(--ink2)}
/* launch view toggle + tier headers */
.lview{margin-left:auto;display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:30px;padding:3px}
.lview-btn{font-size:12px;font-weight:600;color:var(--ink3);padding:6px 13px;border-radius:30px;transition:.15s}
.lview-btn.on{background:var(--bg2);color:var(--ink);box-shadow:var(--shadow)}
.tier-h{display:flex;align-items:center;gap:10px;margin:22px 0 2px}
.tier-n{font-size:11.5px;color:var(--ink3);font-weight:600}
.older-wrap{margin-top:8px}
.lold-btn{width:100%;margin-top:14px;font-size:12.5px;font-weight:600;color:var(--ink2);background:var(--panel);border:1px dashed var(--line2);border-radius:10px;padding:12px;transition:.15s}
.lold-btn:hover{border-color:var(--green-d);color:var(--green)}
/* best value highlight */
.bestrow{margin:20px 0 4px}
.best-h{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--gold);margin-bottom:11px;display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
.best-h span{font-size:10.5px;font-weight:600;text-transform:none;letter-spacing:0;color:var(--ink3)}
.best-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
.best-c{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:12px;padding:15px 16px;cursor:pointer;transition:.16s;position:relative;box-shadow:var(--shadow)}
.best-c:hover{border-color:var(--green-d);box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.best-top{display:flex;align-items:center;gap:9px}
.best-n{font-family:var(--serif);font-size:16px;font-weight:600;line-height:1.1}
.best-sub{font-size:11px;color:var(--ink3);margin-top:6px}
.best-hook{font-size:12.5px;color:var(--ink2);margin-top:9px;font-weight:500}
.best-go{font-size:11.5px;font-weight:600;color:var(--green);margin-top:11px}
@media(max-width:760px){.best-cards{grid-template-columns:1fr}}
/* deep-dive actions + cross-link */
.dd-actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:22px}
.actbtn{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;border-radius:9px;padding:10px 14px;border:1px solid var(--line);color:var(--ink2);background:var(--panel)}
.actbtn.primary{color:#fff;background:linear-gradient(135deg,var(--green),var(--green-d));border-color:var(--green-d)}

.dd-cross{font-size:11px;color:var(--ink3);margin-top:11px;line-height:1.5;font-style:italic}
.bars{margin-top:6px}
.bar-row{display:flex;align-items:center;gap:11px;padding:7px 0}
.bar-row .lab{width:150px;font-size:12.5px;flex:none;color:var(--ink2)}
.bar-row .track{flex:1;height:9px;background:var(--panel2);border-radius:5px;position:relative;overflow:hidden}
.bar-row .fill{height:100%;border-radius:5px}
.bar-row .val{width:54px;text-align:right;font-family:var(--mono);font-size:12.5px;flex:none}

.cmp-col{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
.empty{text-align:center;color:var(--ink3);padding:50px 20px;font-size:14px}
.empty .b{font-family:var(--serif);font-size:19px;color:var(--ink2);margin-bottom:8px}
.foot{color:var(--ink3);font-size:11.5px;text-align:center;padding:30px 20px 50px;line-height:1.6;border-top:1px solid var(--line);margin-top:30px}

.freshbar{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--ink3);padding:12px 0 0;flex-wrap:wrap}

<script>
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];
let D=null,TAB='research',SORT={k:'score',dir:-1},FILT={q:'',seg:'',grade:'',upreg:'',lview:'feed',lold:false},CMP=[];
const TABS=[['research','▦','Research'],['launches','◆','New launches'],['compare','⇄','Compare'],['method','📐','Methodology']];
const median=arr=>{const a=arr.filter(x=>x!=null&&!isNaN(x)).slice().sort((x,y)=>x-y);return a.length?a[Math.floor(a.length/2)]:null;};
const FACS=['value','timing','liquidity','yield','tenure','supply'];
const gletter=g=>g[0];
const tc=s=>(s||'').toLowerCase().replace(/\b([a-z])/g,(m,c)=>c.toUpperCase());
const fmtP=n=>n>=1e6?'$'+(n/1e6).toFixed(2)+'m':'$'+Math.round(n/1e3)+'k';

function fresh(builtISO){
  const built=new Date((builtISO||'')+'T00:00:00+08:00'), now=new Date();
  const days=Math.max(0,Math.floor((now-built)/864e5));
  const ago=isNaN(days)?'recently':days===0?'today':days===1?'yesterday':days+' days ago';
  const add=((6-now.getDay()+7)%7)||7; const next=new Date(now); next.setDate(now.getDate()+add);
  const f2=d=>d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  const fw=d=>d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
  return {ago, built:isNaN(built)?'':f2(built), next:fw(next)};
}

function launchTake(l){
  const r=l.premium, u=(l.txns||0).toLocaleString(), st=launchStatus(l.last)[0].replace('● ','').toLowerCase();
  if(r==null) return `Priced at $${l.launch_psf} psf — ${u} units sold, ${st}.`;
  const w=r<=18?`keenly priced for a new launch at ${r}% over resale`:r<=45?`a ${r}% premium over area resale — typical for a new launch`:r<=60?`a top-end ${r}% premium over resale`:`a steep ${r}% over resale — it needs a strong story`;
  return `At $${l.launch_psf} psf it's ${w} (resale ~$${l.resale_psf||'—'}) — ${u} units sold, ${st}.`;

function bestHook(p){
  const b=[];
  if(!p.value_flag&&p.discount>=4)b.push(`${p.discount}% below peers`);
  if(p.mom!=null&&p.mom<=-4)b.push(`lagged ${p.mom}% / 6mo`);
  if(p.yield)b.push(`${p.yield}% yield`);
  b.push(p.fh?'freehold':'leasehold');
  return b.slice(0,3).join(' · ');
}

  const best=D.projects.filter(p=>['A+','A','A-'].includes(p.grade)&&!p.value_flag).slice(0,3);

function sparkSVG(pts){
  const W=520,H=92,pad={l:8,r:10,t:12,b:16};
  const ts=pts.map(p=>p[0]),vs=pts.map(p=>p[1]);
  const tmin=Math.min(...ts),tspan=(Math.max(...ts)-tmin)||1;
  const lo=Math.min(...vs),hi=Math.max(...vs),span=(hi-lo)||1;
  const X=t=>pad.l+(t-tmin)/tspan*(W-pad.l-pad.r);
  const Y=v=>H-pad.b-(v-lo)/span*(H-pad.t-pad.b);
  const pl=pts.map(p=>`${X(p[0]).toFixed(1)},${Y(p[1]).toFixed(1)}`);
  const up=vs[vs.length-1]>=vs[0], col=up?'#0f9d76':'#cf5349';
  const area=`M${X(ts[0]).toFixed(1)},${H-pad.b} L${pl.join(' L')} L${X(ts[ts.length-1]).toFixed(1)},${H-pad.b} Z`;
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:92px;display:block;margin:4px 0 2px">
    <defs><linearGradient id="spg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${col}" stop-opacity=".18"/><stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#spg)"/>
    <polyline points="${pl.join(' ')}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${X(ts[ts.length-1]).toFixed(1)}" cy="${Y(vs[vs.length-1]).toFixed(1)}" r="3.2" fill="${col}"/>
    <text x="6" y="11" font-size="10" fill="#7e8b9c">$${hi.toLocaleString()}</text>
    <text x="6" y="${H-4}" font-size="10" fill="#7e8b9c">$${lo.toLocaleString()}</text>
  </svg>`;
}

// deep-dive
function openDD(name){
  const p=D.projects.find(x=>x.project===name);if(!p)return;
  const tv='https://www.google.com/search?q='+encodeURIComponent(p.project+' condo singapore');
  const cav='https://adamdegoat.github.io/caveat/?p='+encodeURIComponent(p.project);
  $('#dd').innerHTML=`<div class="dd-head"><span class="gg g ${gletter(p.grade)}">${p.grade}</span>
    <div class="tt">${p.project}<small>${p.street?tc(p.street)+' · ':''}${distName(p.district)} · ${p.seg} · ${p.fh?'Freehold':'Leasehold'}</small></div>
    <span class="x" onclick="closeDD()">✕</span></div>
   <div class="dd-body">
     <div class="thesis">${thesis(p)}</div>
     ${p.value_flag?`<div class="flag-w">⚠ This project's PSF sits unusually far from nearby projects — likely a <b>different product</b> (older or much larger units), so we don't score it on relative value. Verify the comparable set before quoting it.</div>`:''}
     <div class="sect">Factor breakdown <span style="color:var(--ink3);text-transform:none;letter-spacing:0;font-weight:400">· percentile within ${p.seg}, with weight</span></div>
     ${FACS.map(f=>`<div class="facrow"><div class="fl">${D.factor_labels[f]}</div><div class="ft"><i style="width:${p.pct[f]}%;background:${barCol(p.pct[f])}"></i></div><div class="fv">${p.pct[f]}</div><div class="fw">${Math.round(D.weights[f]*100)}%</div></div>`).join('')}
     ${p.spark&&p.spark.length>=4?`<div class="sect">Price trend <span style="color:var(--ink3);text-transform:none;letter-spacing:0;font-weight:400">· median PSF over ${D.window_months} months</span></div>${sparkSVG(p.spark)}`:''}
     <div class="sect">The numbers</div>
     <div class="mgrid">
       <div class="mc"><div class="k">Median PSF</div><div class="v">$${p.psf}</div></div>
       <div class="mc"><div class="k">vs peers (within 1.5km)</div><div class="v ${p.discount>0?'pos':p.discount<0?'neg':''}">${p.value_flag?'n/a':(p.discount>0?'+':'')+p.discount+'%'} <small>${p.value_flag?'product mismatch':'peer $'+p.peer_ref}</small></div></div>
       <div class="mc"><div class="k">6-month PSF trend</div><div class="v ${sg(p.mom)}">${p.mom==null?'—':(p.mom>0?'+':'')+p.mom+'%'}</div></div>
       <div class="mc"><div class="k">Rental yield</div><div class="v">${p.yield?p.yield+'%':'—'}</div></div>
       <div class="mc"><div class="k">Median price</div><div class="v">${fmtP(p.price)} <small>~${p.area}sqm</small></div></div>
       <div class="mc"><div class="k">Sales (liquidity)</div><div class="v">${p.txns} <small>${p.txns_recent} recent</small></div></div>
     </div>
     <div class="dd-actions">
       <a class="actbtn primary" href="${cav}">📐 Value a unit in Caveat</a>
       <button class="actbtn gold" onclick="addCmp('${name.replace(/'/g,"\\'")}')">⇄ Add to compare</button>
       <a class="actbtn" href="${tv}" target="_blank">Look up ↗</a>
     </div>
     <div class="dd-cross">Caveat prices a specific unit here · Thesis grades the project. Two halves of the same call.</div>
   </div>`;
  $('#ov').classList.add('show');
}
function thesis(p){
  const parts=[];
  if(!p.value_flag&&p.discount>=5)parts.push(`Trading <b>${p.discount}% below</b> comparable projects nearby`);
  else if(!p.value_flag&&p.discount<=-5)parts.push(`Priced <b>${-p.discount}% above</b> nearby comparables`);
  else parts.push(`Priced <b>in line</b> with nearby comparables`);
  if(p.mom!=null&&p.mom<=-4)parts.push(`has recently <b>lagged</b> (${p.mom}% / 6mo) — the mean-reversion setup that's paid historically`);
  else if(p.mom!=null&&p.mom>=8)parts.push(`has run <b>hot</b> (+${p.mom}% / 6mo) — stretched, where reversion bites`);
  if(p.yield)parts.push(`yields <b>${p.yield}%</b>`);
  parts.push(p.fh?`freehold`:`leasehold`);
  const sup=p.pct.supply>=60?'low incoming supply nearby':p.pct.supply<=35?'heavy incoming launch supply nearby (a headwind)':'moderate incoming supply';
  parts.push(sup);
  return parts.join(', ').replace(/,([^,]*)$/,' and$1')+'.';
}
function addCmp(n){if(!CMP.includes(n)&&CMP.length<3)CMP.push(n);closeDD();const cn=$('#cmpN');if(cn){cn.style.display='';cn.textContent=CMP.length;}}
function closeDD(){$('#ov').classList.remove('show');}
$('#ov').onclick=e=>{if(e.target.id==='ov')closeDD();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDD();});

// delegated events
document.addEventListener('click',e=>{
  const chip=e.target.closest('.up-chip'); if(chip){FILT.upreg=chip.dataset.reg;render();return;}
  const lv=e.target.closest('.lview-btn'); if(lv){FILT.lview=lv.dataset.v;render();return;}
  const lo=e.target.closest('.lold-btn'); if(lo){FILT.lold=true;render();return;}
  const bc=e.target.closest('.best-c[data-p]'); if(bc){openDD(bc.dataset.p);return;}
  const th=e.target.closest('.tbl thead th[data-k]');
  if(th){const k=th.dataset.k;if(SORT.k===k)SORT.dir*=-1;else{SORT.k=k;SORT.dir=(k==='project'||k==='seg')?1:-1;}render();return;}
  const tr=e.target.closest('.tbl tbody tr[data-p]');
  if(tr){openDD(tr.dataset.p);return;}
});
document.addEventListener('input',e=>{if(e.target.id==='q'){FILT.q=e.target.value;const a=$('#app');const inp=e.target;const pos=inp.selectionStart;render();const ni=$('#q');if(ni){ni.focus();ni.setSelectionRange(pos,pos);}}});
document.addEventListener('change',e=>{if(e.target.id==='fseg'){FILT.seg=e.target.value;render();}if(e.target.id==='fgrade'){FILT.grade=e.target.value;render();}});
function esc(s){return String(s).replace(/"/g,'&quot;');}
</script>
</body>

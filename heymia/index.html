<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Jane Tan · Front Desk</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230B0A0D'/%3E%3Ccircle cx='16' cy='16' r='7' fill='%231FA98C'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0B0A0D; --ink-2:#131116; --ink-3:#17151b;
  --line:rgba(242,237,230,.09); --line-2:rgba(242,237,230,.16);
  --text:#F3EEE7; --muted:#9A939C; --muted-2:#837D88;
  --accent:#1FA98C; --accent-2:#2fc4a6; --accent-soft:rgba(31,169,140,.12);
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{background:var(--ink);color:var(--text);font-family:"Space Grotesk",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;overflow:hidden}
.mono{font-family:"Space Mono",monospace}

/* ---------- app shell ---------- */
.app{height:100%;height:100dvh;display:flex;flex-direction:column;max-width:780px;margin:0 auto;
  padding:clamp(12px,2vw,20px) clamp(12px,2.4vw,26px) 0}
header{display:flex;align-items:center;justify-content:space-between;flex:0 0 auto;
  padding-bottom:13px;border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.avatar{width:44px;height:44px;border-radius:50%;flex:none;position:relative;overflow:hidden;
  background:var(--ink-3);border:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;
  font-weight:600;font-size:16px;color:var(--text)}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar::after{content:"";position:absolute;right:-1px;bottom:-1px;width:12px;height:12px;border-radius:50%;
  background:var(--accent);border:2px solid var(--ink)}
.bmeta{display:flex;flex-direction:column;min-width:0}
.bname{font-weight:600;font-size:16px;letter-spacing:-.01em;line-height:1.15}
.bstat{font-family:"Space Mono",monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted-2);margin-top:2px;white-space:nowrap}
.bstat .on{color:var(--accent)}
.bstat .sfx{color:var(--muted-2)}
.hright{display:flex;align-items:center;gap:9px;flex:none}
.wa{display:inline-flex;align-items:center;gap:8px;text-decoration:none;white-space:nowrap;
  border:1px solid var(--line-2);color:var(--text);padding:8px 14px;border-radius:999px;
  font-size:13px;font-weight:600;transition:border-color .2s,background .2s}
.wa:hover{border-color:var(--accent);background:var(--accent-soft)}
.wa svg{width:15px;height:15px;flex:none}

/* ---------- thread ---------- */
.thread{flex:1 1 auto;min-height:0;overflow-y:auto;overscroll-behavior:contain;
  display:flex;flex-direction:column;gap:12px;padding:18px 0 8px}
.thread::-webkit-scrollbar{width:7px}
.thread::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:99px}
.msg{max-width:min(82%,540px);display:flex;flex-direction:column;gap:5px;animation:pop .28s cubic-bezier(.2,.7,.2,1)}
@keyframes pop{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.msg.mia{align-self:flex-start}
.msg.you{align-self:flex-end;align-items:flex-end}
.mtop{display:flex;align-items:center;gap:8px}
.mwho{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent)}
.msg.you .mwho{color:var(--muted-2)}
.mtime{font-family:"Space Mono",monospace;font-size:10px;color:var(--muted-2)}
.bubble{font-size:15px;line-height:1.5;letter-spacing:-.005em;padding:11px 15px;border-radius:16px;
  overflow-wrap:break-word;word-break:break-word}
.msg.mia .bubble{background:var(--ink-2);border:1px solid var(--line-2);border-left:2px solid var(--accent);
  border-top-left-radius:5px;color:var(--text)}
.msg.you .bubble{background:var(--accent);color:#04150f;border-top-right-radius:5px;font-weight:500}
.msg.mia.speaking .bubble{box-shadow:0 0 0 1px var(--accent-soft)}
.spk{display:none;align-items:flex-end;gap:2.5px;height:12px;margin-top:8px;margin-left:2px}
.msg.mia.speaking .spk{display:inline-flex}
.spk i{width:3px;border-radius:2px;background:var(--accent);transform-origin:bottom;animation:eq 1s ease-in-out infinite}
.spk i:nth-child(1){height:40%;animation-delay:0s}.spk i:nth-child(2){height:90%;animation-delay:.15s}
.spk i:nth-child(3){height:60%;animation-delay:.3s}.spk i:nth-child(4){height:100%;animation-delay:.45s}
.spk i:nth-child(5){height:50%;animation-delay:.6s}
@keyframes eq{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}
.typing .bubble{display:flex;gap:6px;padding:15px}
.typing .bubble i{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite}
.typing .bubble i:nth-child(2){animation-delay:.2s}.typing .bubble i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.25;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}

/* ---------- dock: suggestions + composer ---------- */
.dock{flex:0 0 auto;padding-bottom:clamp(10px,2vw,16px)}
.suggest{display:flex;flex-direction:column;gap:9px;margin-bottom:11px}
.slabel{font-family:"Space Mono",monospace;font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-2);margin:0 2px 6px}
.srow{display:flex;gap:8px;flex-wrap:wrap}
.chip{flex:0 0 auto;scroll-snap-align:start;appearance:none;cursor:pointer;white-space:nowrap;
  background:var(--ink-2);border:1px solid var(--line-2);color:var(--text);
  font-family:"Space Grotesk";font-size:13.5px;font-weight:500;padding:9px 15px;border-radius:999px;
  transition:border-color .18s,color .18s,background .18s,transform .12s}
.chip:hover{border-color:var(--accent);background:var(--accent-soft)}
.chip:active{transform:scale(.96)}
.chip.lead{border-color:var(--accent);color:var(--accent-2)}
.composer{display:flex;align-items:center;gap:10px}
.tin{flex:1 1 auto;min-width:0;height:54px;box-sizing:border-box;padding:0 20px;
  background:rgba(242,237,230,.06);border:1px solid var(--line-2);border-radius:27px;
  color:var(--text);font-family:"Space Grotesk";font-size:16px;line-height:normal;transition:border-color .2s,background .2s}
.tin::placeholder{color:var(--muted-2)}
.tin:focus{outline:none;border-color:var(--accent);background:rgba(242,237,230,.09)}
.send{flex:0 0 auto;width:54px;height:54px;border-radius:50%;border:0;background:var(--accent);color:#04150f;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .2s,transform .12s}
.send:hover{background:var(--accent-2)}.send:active{transform:scale(.94)}
.send svg{width:20px;height:20px}
.powered{text-align:center;margin-top:9px;font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--muted-2)}
.powered b{color:var(--muted);font-weight:400}

/* ---------- desktop: two panes ---------- */
@media (min-width:900px){
  .app{max-width:1200px;display:grid;grid-template-columns:minmax(0,1fr) 320px;
    grid-template-rows:auto minmax(0,1fr) auto;grid-template-areas:"head head" "thread rail" "compose rail";
    column-gap:38px;padding:20px 32px 24px}
  header{grid-area:head}
  .thread{grid-area:thread;padding:22px 6px 10px}
  .dock{display:contents}
  .composer{grid-area:compose;padding-top:6px}
  .powered{grid-area:compose}
  .msg{max-width:min(88%,600px)}
  .suggest{grid-area:rail;align-self:stretch;min-height:0;overflow-y:auto;margin:0;
    padding:22px 4px 22px 26px;border-left:1px solid var(--line);gap:18px;
    -webkit-mask-image:linear-gradient(180deg,transparent,#000 22px,#000 calc(100% - 22px),transparent);
    mask-image:linear-gradient(180deg,transparent,#000 22px,#000 calc(100% - 22px),transparent)}
  .suggest::-webkit-scrollbar{width:7px}.suggest::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:99px}
  .suggest .chip{white-space:normal;text-align:left;line-height:1.3;max-width:100%;flex:0 1 auto}
  .powered{grid-column:1;text-align:left;margin-top:2px}
}

/* ---------- mobile chip strip ---------- */
@media (max-width:640px){
  .app{max-width:100%;padding:10px 12px 0}
  .wa span{display:none}.wa{padding:9px}
  .msg{max-width:86%}
  .bstat .sfx{display:none}
  .srow{flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;scroll-snap-type:x proximity;
    -webkit-mask-image:linear-gradient(90deg,#000 90%,transparent);mask-image:linear-gradient(90deg,#000 90%,transparent)}
  .srow::-webkit-scrollbar{display:none}
}

/* ---------- lead showcase modal ---------- */
.leadwrap{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;padding:20px}
.leadwrap.open{display:flex}
.leadbg{position:absolute;inset:0;background:rgba(6,5,8,.74);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.leadcard{position:relative;width:min(430px,100%);background:var(--ink-2);border:1px solid var(--line-2);
  border-radius:24px;padding:30px 28px;animation:leadup .34s cubic-bezier(.2,.7,.2,1);max-height:calc(100dvh - 40px);overflow-y:auto}
@keyframes leadup{from{transform:translateY(18px);opacity:0}to{transform:none;opacity:1}}
.leadtag{color:var(--accent);font-size:10px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:13px;display:flex;align-items:center;gap:7px}
.leadtag .d{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.leadtitle{font-size:23px;font-weight:700;letter-spacing:-.01em;margin:0 0 4px}
.leadsub{color:var(--muted);font-size:14px;margin:0 0 18px;line-height:1.45}
.lfield{margin-bottom:12px}
.lfield span{display:block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);margin-bottom:6px}
.lfield input{width:100%;height:52px;box-sizing:border-box;padding:0 16px;background:rgba(242,237,230,.05);
  border:1px solid var(--line-2);border-radius:12px;color:var(--text);font-family:"Space Grotesk";font-size:16px}
.lfield input:focus{outline:none;border-color:var(--accent)}
.lfield input::placeholder{color:var(--muted-2)}
.leadsend{width:100%;margin-top:8px;background:var(--accent);color:#04150f;border:0;border-radius:999px;
  height:52px;font-family:"Space Grotesk";font-weight:600;font-size:16px;cursor:pointer}
.leadsend:hover{background:var(--accent-2)}
.leadskip{width:100%;margin-top:9px;background:transparent;border:0;color:var(--muted-2);font-family:"Space Grotesk";font-size:13px;cursor:pointer}
.leaddone{text-align:center;padding:6px 0}
.leadcheck{width:56px;height:56px;border-radius:50%;background:var(--accent-soft);border:1px solid var(--accent);
  margin:0 auto 14px;display:flex;align-items:center;justify-content:center}
.leadcheck svg{width:26px;height:26px;stroke:var(--accent)}
.leadpunch{color:var(--accent);font-size:14.5px;font-weight:500;margin:8px 0 20px;line-height:1.4}

/* ---------- veil (entry) ---------- */
.veil{position:fixed;inset:0;z-index:20;background:radial-gradient(1000px 520px at 50% -12%,#1a1720,var(--ink) 62%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center;padding:26px;
  transition:opacity .55s ease}
.veil.gone{opacity:0;pointer-events:none}
.veil .vava{width:84px;height:84px;border-radius:50%;overflow:hidden;background:var(--ink-3);border:1px solid var(--line-2);
  display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:600;color:var(--text)}
.veil .vava img{width:100%;height:100%;object-fit:cover}
.veil .vname{font-size:clamp(30px,6vw,44px);font-weight:700;letter-spacing:-.02em;line-height:1.05;margin-top:4px}
.veil .vtag{max-width:26ch;font-size:clamp(15px,2vw,19px);color:var(--muted);line-height:1.5}
.veil .vmeta{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-2)}
.begin{appearance:none;border:0;cursor:pointer;background:var(--accent);color:#04150f;
  font-family:"Space Grotesk";font-weight:600;font-size:16px;padding:15px 34px;border-radius:999px;margin-top:6px;
  display:flex;align-items:center;gap:11px;box-shadow:0 8px 30px -8px var(--accent);transition:background .2s}
.begin:hover{background:var(--accent-2)}
.begin .d{width:8px;height:8px;border-radius:50%;background:#04150f;opacity:.7}
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="brand">
      <div class="avatar" id="avatar"></div>
      <div class="bmeta">
        <div class="bname" id="bname"></div>
        <div class="bstat" id="bstat"><span class="on">● Online</span><span class="sfx" id="bsfx"></span></div>
      </div>
    </div>
    <div class="hright">
      <a class="wa" id="waBtn" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        <span id="waLabel">WhatsApp</span>
      </a>
    </div>
  </header>

  <div class="thread" id="thread" aria-live="polite"></div>

  <div class="dock">
    <div class="suggest" id="suggest"></div>
    <div class="composer">
      <input class="tin" id="tin" type="text" placeholder="Message" autocomplete="off" enterkeyhint="send" aria-label="Message">
      <button class="send" id="tsend" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M7 11l5-5 5 5"/><path d="M12 6v13"/></svg>
      </button>
    </div>
    <div class="powered" id="powered"><b>powered by</b> Hey Mia</div>
  </div>
</div>

<div class="leadwrap" id="leadwrap" aria-hidden="true">
  <div class="leadbg" id="leadbg"></div>
  <div class="leadcard" role="dialog" aria-modal="true">
    <div id="leadform">
      <div class="leadtag mono"><span class="d"></span>Lead capture · live demo</div>
      <h3 class="leadtitle">Leave it with Mia</h3>
      <p class="leadsub" id="leadsub"></p>
      <div class="lfield"><span>Name</span><input id="ld_name" placeholder="Your name" autocomplete="off"></div>
      <div class="lfield"><span>Mobile</span><input id="ld_phone" placeholder="Your number" inputmode="tel" autocomplete="off"></div>
      <div class="lfield"><span>What are you after?</span><input id="ld_intent" placeholder="Buying, selling, or renting" autocomplete="off"></div>
      <button class="leadsend" id="leadsend">Send to <span id="leadagent"></span></button>
      <button class="leadskip" id="leadskip">Maybe later</button>
    </div>
    <div class="leaddone" id="leaddone" hidden>
      <div class="leadcheck"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
      <h3 class="leadtitle" id="leaddonetitle">Caught.</h3>
      <p class="leadpunch" id="leadpunch"></p>
      <button class="leadsend" id="leaddoneok">Done</button>
    </div>
  </div>
</div>

<div class="veil" id="veil">
  <div class="vava" id="vava"></div>
  <div class="vmeta" id="vmeta"></div>
  <div class="vname" id="vname"></div>
  <div class="vtag" id="vtag"></div>
  <button class="begin" id="begin"><span class="d"></span>Start chatting</button>
</div>

<script>
/* ============================================================================
   CONFIG — this whole page is driven by this object. In production it loads
   from the agent's record in the database (by ?a=<slug>). Change it, and the
   front desk becomes a different agent. This is the sample agent "Jane".
   ============================================================================ */
const CONFIG = {
  agent: {
    name: "Jane Tan",
    agency: "PropNest Realty",
    cea: "R012345A",
    assistant: "Mia",
    accent: "#1FA98C",
    accent2: "#2fc4a6",
    photo: "",
    initials: "JT",
    tagline: "Your 24/7 property front desk. East-side resale and new launches.",
    whatsapp: "6591234567",
    tier: "standard"          // standard shows "powered by Hey Mia"; premium hides it
  },
  greeting: "Hi, I'm Mia, Jane's front desk. Ask me anything about Singapore property, or about Jane's listings in the East, and I'll answer on real data. Tap a suggestion or just text me.",
  chips: [
    { label: "Ask about property", items: [
      "What's a 4-room in Tampines worth?",
      "How's the market right now?",
      "What's the latest property news?",
      "What's the ABSD on a second home?",
    ]},
    { label: "Work with Jane", items: [
      { q: "I want Jane to help me buy", lead: true },
      "What areas does Jane cover?",
      "Can I book a viewing?",
    ]},
  ],
  workerUrl: "https://mia-brain.propsightsg.workers.dev"   // shared property brain (Jane's own knowledge wires in next)
};

/* ---- apply brand from config ---- */
const A = CONFIG.agent;
document.documentElement.style.setProperty('--accent', A.accent);
document.documentElement.style.setProperty('--accent-2', A.accent2 || A.accent);
document.documentElement.style.setProperty('--accent-soft', hexA(A.accent, .12));
function hexA(hex,a){const h=hex.replace('#','');const n=parseInt(h.length===3?h.replace(/(.)/g,'$1$1'):h,16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}
function avatarHTML(){ return A.photo ? `<img src="${A.photo}" alt="">` : (A.initials || A.name.split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase()); }
document.title = A.name + " · Front Desk";
el('avatar').innerHTML = avatarHTML();
el('bname').textContent = A.name;
el('bsfx').textContent = " · " + A.agency;
el('waLabel').textContent = "WhatsApp " + A.name.split(/\s+/)[0];
el('waBtn').href = "https://wa.me/" + A.whatsapp;
el('powered').style.display = A.tier === 'premium' ? 'none' : '';
// veil
el('vava').innerHTML = avatarHTML();
el('vmeta').textContent = A.agency + " · CEA " + A.cea;
el('vname').textContent = A.name;
el('vtag').textContent = A.tagline;
el('leadagent').textContent = A.name.split(/\s+/)[0];
el('leadsub').textContent = "Pretend you're a client landing on " + A.name.split(/\s+/)[0] + "'s page at midnight. Leave your details and watch Mia catch the lead.";

function el(id){ return document.getElementById(id); }
const thread = el('thread');
let convo = [], busy=false, started=false, turn=0;
const SAY = A.assistant || "Mia";

/* ---- suggestion chips ---- */
(function(){
  const wrap = el('suggest');
  CONFIG.chips.forEach(g=>{
    const grp=document.createElement('div'); grp.className='sgroup';
    const lb=document.createElement('div'); lb.className='slabel'; lb.textContent=g.label; grp.appendChild(lb);
    const row=document.createElement('div'); row.className='srow';
    g.items.forEach(c=>{
      const q = typeof c==='string'?c:c.q;
      const b=document.createElement('button'); b.className='chip'+((c.lead)?' lead':''); b.textContent=q;
      b.addEventListener('click',()=>{ if(c.lead) leadDemo(q); else send(q); });
      row.appendChild(b);
    });
    grp.appendChild(row); wrap.appendChild(grp);
  });
})();

/* ---- messages ---- */
function nowTime(){ const d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function scrollDown(){ requestAnimationFrame(()=>{ thread.scrollTop=thread.scrollHeight; }); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function addMsg(who,text){
  const m=document.createElement('div'); m.className='msg '+(who==='mia'?'mia':'you');
  m.innerHTML='<div class="mtop"><span class="mwho">'+(who==='mia'?SAY:'You')+'</span><span class="mtime mono">'+nowTime()+'</span></div>'
    +'<div class="bubble">'+esc(text)+'</div>'+(who==='mia'?'<span class="spk"><i></i><i></i><i></i><i></i><i></i></span>':'');
  thread.appendChild(m); scrollDown(); return m;
}
let typingEl=null;
function showTyping(){ hideTyping(); typingEl=document.createElement('div'); typingEl.className='msg mia typing';
  typingEl.innerHTML='<div class="mtop"><span class="mwho">'+SAY+'</span></div><div class="bubble"><i></i><i></i><i></i></div>';
  thread.appendChild(typingEl); scrollDown(); }
function hideTyping(){ if(typingEl){ typingEl.remove(); typingEl=null; } }
let speakingBubble=null;
function setSpeaking(m){ clearSpeaking(); speakingBubble=m; m.classList.add('speaking'); }
function clearSpeaking(m){ const b=m||speakingBubble; if(b) b.classList.remove('speaking'); if(!m||m===speakingBubble) speakingBubble=null; }
function setStatus(s){ const b=el('bstat'); if(s==='typing') b.innerHTML='<span class="on">● typing…</span>'; else if(s==='speaking') b.innerHTML='<span class="on">● speaking</span>'; else b.innerHTML='<span class="on">● Online</span><span class="sfx"> · '+A.agency+'</span>'; }

/* ---- ask ---- */
const FALLBACK = "Give me one more go, that dropped for a second.";
async function send(text){
  if(!started) return; stopSpeaking();
  const my=++turn; busy=true;
  addMsg('you', text); convo.push({role:'user',content:text});
  el('tin').value=''; showTyping(); setStatus('typing');
  let reply=null;
  try{
    const ctrl=new AbortController(), to=setTimeout(()=>ctrl.abort(),12000);
    const r=await fetch(CONFIG.workerUrl,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:convo}),signal:ctrl.signal});
    clearTimeout(to); const j=await r.json();
    if(j&&j.reply) reply=j.reply;
  }catch(e){ console.warn('answer failed',e); }
  if(my!==turn){ busy=false; return; }
  hideTyping(); reply = reply || FALLBACK; convo.push({role:'assistant',content:reply});
  const m=addMsg('mia', reply); setStatus('speaking'); setSpeaking(m);
  speak(reply, ()=>{ clearSpeaking(m); setStatus('online'); if(my===turn) busy=false; });
}

/* ---- lead showcase ---- */
function leadDemo(q){
  if(!started) return; stopSpeaking();
  const my=++turn; busy=true;
  addMsg('you', q); convo.push({role:'user',content:q});
  const line = "Of course. Give me your name and number and I'll have "+A.name.split(/\s+/)[0]+" reach out. Watch what I do with it.";
  showTyping(); setStatus('typing');
  setTimeout(()=>{ if(my!==turn) return; hideTyping();
    const m=addMsg('mia', line); convo.push({role:'assistant',content:line});
    setSpeaking(m); setStatus('speaking'); speak(line, ()=>{ clearSpeaking(m); setStatus('online'); if(my===turn) busy=false; });
    setTimeout(()=>{ if(my===turn) openLead(); }, 900);
  }, 650);
}
const leadwrap=el('leadwrap');
function openLead(){ el('leadform').hidden=false; el('leaddone').hidden=true;
  el('ld_name').value='';el('ld_phone').value='';el('ld_intent').value='';
  leadwrap.classList.add('open'); leadwrap.setAttribute('aria-hidden','false');
  setTimeout(()=>{ try{el('ld_name').focus();}catch(e){} },340); }
function closeLead(){ leadwrap.classList.remove('open'); leadwrap.setAttribute('aria-hidden','true'); }
function submitLead(){ const name=(el('ld_name').value||'').trim(); if(!name){ el('ld_name').focus(); return; }
  el('leaddonetitle').textContent='Caught, '+name.split(/\s+/)[0]+'.';
  el('leadpunch').textContent='In a live setup, this reaches '+A.name.split(/\s+/)[0]+"'s Telegram the instant it's sent. That's the client you'd have lost while you slept.";
  el('leadform').hidden=true; el('leaddone').hidden=false; }
el('leadsend').addEventListener('click', submitLead);
el('leadskip').addEventListener('click', closeLead);
el('leaddoneok').addEventListener('click', closeLead);
el('leadbg').addEventListener('click', closeLead);
document.addEventListener('keydown', e=>{ if(e.key==='Escape' && leadwrap.classList.contains('open')) closeLead(); });

/* ---- voice out (shared worker TTS; browser fallback) ---- */
let curAudio=null, speakToken=0;
function speak(text,done){ stopSpeaking(); const my=++speakToken;
  workerVoice(text,my,done).catch(()=>{ if(my===speakToken) browserSpeak(text,done); }); }
async function workerVoice(text,my,done){
  const ctrl=new AbortController(), to=setTimeout(()=>ctrl.abort(),11000);
  const r=await fetch(CONFIG.workerUrl,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({text}),signal:ctrl.signal}); clearTimeout(to);
  if(!r.ok) throw new Error('tts'); const blob=await r.blob();
  if(my!==speakToken) return; const url=URL.createObjectURL(blob);
  const a=new Audio(url); a.playsInline=true; curAudio=a;
  a.onended=()=>{ done&&done(); URL.revokeObjectURL(url); }; a.onerror=()=>{ done&&done(); };
  try{ await a.play(); }catch(e){ done&&done(); }
}
function browserSpeak(text,done){ try{ const u=new SpeechSynthesisUtterance(text); u.onend=()=>done&&done();
  speechSynthesis.cancel(); speechSynthesis.speak(u); }catch(e){ done&&done(); } }
function stopSpeaking(){ speakToken++; try{ if(curAudio){ curAudio.pause(); curAudio=null; } }catch(e){}
  try{ speechSynthesis.cancel(); }catch(e){} }

/* ---- start ---- */
function start(){ if(started) return; started=true; el('veil').classList.add('gone');
  const m=addMsg('mia', CONFIG.greeting); convo.push({role:'assistant',content:CONFIG.greeting});
  setSpeaking(m); setStatus('speaking'); speak(CONFIG.greeting, ()=>{ clearSpeaking(m); setStatus('online'); }); }
el('begin').addEventListener('click', start);
el('tsend').addEventListener('click', ()=>{ const t=el('tin').value.trim(); if(t&&!busy) send(t); });
el('tin').addEventListener('keydown', e=>{ if(e.key==='Enter'){ const t=el('tin').value.trim(); if(t&&!busy) send(t); } });
</script>

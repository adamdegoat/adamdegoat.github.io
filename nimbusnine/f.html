<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Front desk</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23171512'/%3E%3Csvg x='6' y='7' width='20' height='16' viewBox='4 6 40 32'%3E%3Ccircle cx='34' cy='15' r='6.6' fill='%23E8663A'/%3E%3Cpath d='M15 35C10 35 6 31.5 6 27C6 22.8 9.3 19.4 13.4 19.1C14.4 14.2 18.8 10.6 24 10.6C30 10.6 35 15 35.8 20.8C39.9 21 43 24.4 43 28.5C43 32.1 40.1 35 36.5 35Z' fill='%23F3EFE8'/%3E%3C/svg%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="fontlink" rel="stylesheet">
<style>
  :root{
    --bg:#f3efe8;--ink:#171512;--muted:#635b4f;
    --accent:#e8663a;--accent-ink:#b24714;--line:rgba(23,21,18,.12);
    --mono:"Spline Sans Mono",ui-monospace,monospace;
    /* style-driven tokens (Clean = defaults) */
    --font:"Plus Jakarta Sans",system-ui,sans-serif;
    --font-head:"Plus Jakarta Sans",system-ui,sans-serif;
    --name-weight:700;--name-size:16px;--name-spacing:-.01em;
    --label-font:var(--mono);--label-size:11px;--label-spacing:.04em;--label-transform:uppercase;
    --who-fg:var(--muted);
    --av-radius:13px;--av-bg:var(--ink);
    --deskbg:#fbf9f5;
    --head-bg:#fbf9f5;--head-fg:var(--ink);--head-border:1px solid var(--line);
    --bubble-radius:16px;--bubble-tail:5px;
    --in-bg:#efe9df;--in-fg:var(--ink);
    --out-bg:var(--ink);--out-fg:#fbf9f5;
    --chip-bg:transparent;--chip-fg:var(--accent-ink);--chip-border:1px solid rgba(178,71,20,.35);--chip-weight:500;--chip-radius:100px;
    --input-bg:#efe9df;
    --voice-bg:rgba(232,102,58,.11);--voice-fg:var(--accent-ink);--voice-border:1px solid rgba(178,71,20,.32);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;line-height:1.5}
  .desk{width:100%;max-width:520px;height:100dvh;max-height:900px;display:flex;flex-direction:column;background:var(--deskbg);position:relative;overflow:hidden}
  @media(min-width:560px){.desk{border:1px solid var(--line);border-radius:22px;height:min(100dvh,860px);box-shadow:0 40px 90px -50px rgba(23,21,18,.5);margin:16px}}
  /* header */
  .dhead{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:var(--head-border);flex:none;background:var(--head-bg);color:var(--head-fg)}
  .davatar{position:relative;width:44px;height:44px;border-radius:var(--av-radius);background:var(--av-bg);flex:none;display:flex;align-items:center;justify-content:center}
  .davatar svg{width:26px;height:21px}
  .davatar::after{content:"";position:absolute;right:-2px;bottom:-2px;width:13px;height:13px;border-radius:50%;background:#2f9e5f;border:2.5px solid var(--head-bg)}
  .dmeta{min-width:0;flex:1}
  .dname{font-family:var(--font-head);font-weight:var(--name-weight);font-size:var(--name-size);letter-spacing:var(--name-spacing);line-height:1.15;color:var(--head-fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dwho{font-family:var(--font);font-size:12.5px;color:var(--who-fg);margin-top:3px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dvoice{margin-left:auto;display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 12px 0 10px;border-radius:100px;border:var(--voice-border);background:var(--voice-bg);color:var(--voice-fg);cursor:pointer;font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.03em;text-transform:uppercase}
  .dvoice svg{width:14px;height:14px}
  .dvoice.muted{background:transparent;border-color:var(--line);color:var(--muted);opacity:.85}
  /* thread */
  .dthread{flex:1;overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:11px;scroll-behavior:smooth}
  .msg{max-width:86%;padding:12px 15px;border-radius:var(--bubble-radius);font-size:15px;line-height:1.45}
  .msg.in{background:var(--in-bg);color:var(--in-fg);border-bottom-left-radius:var(--bubble-tail);align-self:flex-start}
  .msg.out{background:var(--out-bg);color:var(--out-fg);border-bottom-right-radius:var(--bubble-tail);align-self:flex-end}
  .typing{align-self:flex-start;display:flex;gap:4px;padding:14px 15px;background:var(--in-bg);border-radius:var(--bubble-radius);border-bottom-left-radius:var(--bubble-tail)}
  .typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);opacity:.4;animation:bl 1.4s infinite both}
  .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
  @keyframes bl{0%,60%,100%{opacity:.35}30%{opacity:1}}
  /* chips */
  .dchips{display:flex;flex-wrap:wrap;gap:7px;padding:2px 16px 12px;flex:none}
  .chip{font-family:var(--font);font-size:12.5px;font-weight:var(--chip-weight);color:var(--chip-fg);background:var(--chip-bg);border:var(--chip-border);border-radius:var(--chip-radius);padding:7px 12px;cursor:pointer;transition:opacity .2s,transform .15s}
  .chip:hover{opacity:.82}
  .chip:active{transform:scale(.97)}
  .chip.gone{opacity:.4}
  /* input */
  .dbar{display:flex;align-items:center;gap:8px;padding:11px 14px 12px;border-top:1px solid var(--line);flex:none}
  .dinput{flex:1;min-width:0;border:none;background:var(--input-bg);border-radius:100px;padding:12px 16px;font-family:var(--font);font-size:15px;color:var(--ink);outline:none}
  .dinput::placeholder{color:var(--muted)}
  .dsend{width:40px;height:40px;border-radius:50%;border:none;background:var(--accent-ink);color:#fff;flex:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s}
  .dsend:hover{transform:translateY(-1px)}
  .dsend:disabled{opacity:.45;transform:none}
  .dfoot{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 16px 12px;flex:none}
  .dlead{font-family:var(--mono);font-size:11px;color:var(--accent-ink);background:none;border:none;cursor:pointer;text-transform:uppercase;letter-spacing:.04em}
  .powered{font-family:var(--mono);font-size:10.5px;color:var(--muted);letter-spacing:.02em;text-decoration:none}
  .powered b{color:var(--ink);font-weight:500}
  /* lead form */
  .lead{position:absolute;inset:0;background:rgba(23,21,18,.4);display:none;align-items:flex-end;z-index:5}
  .lead.on{display:flex}
  .leadcard{background:var(--deskbg);width:100%;border-radius:22px 22px 0 0;padding:22px 20px 24px}
  .leadcard h3{font-family:var(--font-head);font-size:19px;font-weight:var(--name-weight);letter-spacing:-.01em}
  .leadcard p{font-size:13.5px;color:var(--muted);margin-top:5px}
  .leadcard input{width:100%;border:1px solid var(--line);background:var(--input-bg);border-radius:12px;padding:13px 15px;font-family:var(--font);font-size:15px;color:var(--ink);margin-top:12px;outline:none}
  .leadcard input:focus{border-color:var(--accent-ink)}
  .leadbtns{display:flex;gap:10px;margin-top:16px}
  .leadsend{flex:1;background:var(--accent-ink);color:#fff;border:none;border-radius:100px;padding:13px;font-family:var(--font);font-weight:600;font-size:15px;cursor:pointer}
  .leadcancel{background:none;border:none;color:var(--muted);font-family:var(--font);font-size:14px;cursor:pointer;padding:0 10px}
  .center{height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted);font-family:var(--mono);font-size:14px;padding:24px;text-align:center}

  /* ============ STYLES ============ */
  /* WARM — editorial serif, circle avatar, cosy cream, rounded bubbles */
  [data-style="warm"]{
    --font:"Figtree",system-ui,sans-serif;--font-head:"Hedvig Letters Serif",Georgia,serif;
    --name-weight:500;--name-size:20px;--name-spacing:0;
    --label-font:"Figtree",sans-serif;--label-transform:none;--label-spacing:.005em;--label-size:12px;
    --av-radius:50%;
    --bg:#ece2d1;--deskbg:#f7f1e6;--head-bg:#f7f1e6;--head-border:1px solid rgba(23,21,18,.09);
    --bubble-radius:20px;--in-bg:#efe4d1;
    --out-bg:var(--accent-ink);--out-fg:#fff;
    --chip-bg:rgba(232,102,58,.12);--chip-fg:var(--accent-ink);--chip-border:1px solid transparent;--chip-weight:600;
    --input-bg:#efe4d1;
  }
  /* BOLD — heavy grotesque, thick rule, chunky squarer bubbles, solid chips */
  [data-style="bold"]{
    --font:"Bricolage Grotesque",system-ui,sans-serif;--font-head:"Bricolage Grotesque",system-ui,sans-serif;
    --name-weight:800;--name-size:22px;--name-spacing:-.03em;
    --av-radius:12px;
    --bg:#eceae3;--deskbg:#ffffff;--head-bg:#ffffff;--head-border:2px solid var(--ink);
    --bubble-radius:9px;--in-bg:#f0eee7;
    --out-bg:var(--accent);--out-fg:#171512;
    --chip-bg:var(--ink);--chip-fg:#fff;--chip-border:1px solid var(--ink);--chip-weight:600;--chip-radius:9px;
    --input-bg:#f0eee7;
  }
  /* SLEEK — tight Space Grotesk, dark header bar, cool ground, refined */
  [data-style="sleek"]{
    --font:"Space Grotesk",system-ui,sans-serif;--font-head:"Space Grotesk",system-ui,sans-serif;
    --name-weight:600;--name-size:16px;--name-spacing:-.01em;
    --av-radius:11px;--av-bg:var(--accent);
    --bg:#e7e7e4;--deskbg:#f7f7f5;
    --head-bg:#1b1917;--head-fg:#f4f3f0;--head-border:none;--who-fg:rgba(244,243,240,.62);
    --bubble-radius:13px;--in-bg:#ecebe5;
    --out-bg:#1b1917;--out-fg:#f4f3f0;
    --chip-bg:transparent;--chip-fg:var(--accent-ink);--chip-border:1px solid var(--line);
    --input-bg:#ecebe5;
    --voice-bg:rgba(244,243,240,.1);--voice-fg:#f4f3f0;--voice-border:1px solid rgba(244,243,240,.24);
  }
</style>
</head>
<body>
<div class="desk" id="desk" style="display:none">
  <div class="dhead">
    <span class="davatar" aria-hidden="true"><svg viewBox="4 6 40 32"><circle cx="34" cy="15" r="6.6" fill="#E8663A"/><path d="M15 35C10 35 6 31.5 6 27C6 22.8 9.3 19.4 13.4 19.1C14.4 14.2 18.8 10.6 24 10.6C30 10.6 35 15 35.8 20.8C39.9 21 43 24.4 43 28.5C43 32.1 40.1 35 36.5 35Z" fill="#F3EFE8"/></svg></span>
    <div class="dmeta">
      <div class="dname" id="dname">Front desk</div>
      <div class="dwho" id="dwho"></div>
    </div>
    <button class="dvoice" id="dvoice" type="button" aria-pressed="true" aria-label="Voice on, tap to turn off">
      <svg id="vicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7M19 5a9 9 0 0 1 0 14"/></svg>
      <span id="vlabel">Voice on</span>
    </button>
  </div>
  <div class="dthread" id="thread" role="log" aria-live="polite"></div>
  <div class="dchips" id="chips"></div>
  <form class="dbar" id="bar">
    <input class="dinput" id="input" type="text" placeholder="Type your message" autocomplete="off" aria-label="Message">
    <button class="dsend" id="send" type="submit" aria-label="Send"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button>
  </form>
  <div class="dfoot">
    <button class="dlead" id="leadopen" type="button">Leave your details</button>
    <a class="powered" href="https://adamdegoat.github.io/nimbusnine/" target="_blank" rel="noopener">powered by <b>Nimbus Nine</b></a>
  </div>
  <div class="lead" id="lead">
    <form class="leadcard" id="leadform">
      <h3>Leave your details</h3>
      <p>We'll get back to you shortly.</p>
      <input id="lhp" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-9999px;width:1px;height:1px">
      <input id="lname" type="text" placeholder="Your name" autocomplete="name">
      <input id="lcontact" type="text" placeholder="Phone or email" autocomplete="tel">
      <p style="font-size:11px;color:var(--muted);margin-top:11px;line-height:1.45">By sending, you're happy for us to use your details to follow up on your enquiry.</p>
      <div class="leadbtns"><button class="leadsend" type="submit">Send</button><button class="leadcancel" type="button" id="leadcancel">Cancel</button></div>
    </form>
  </div>
</div>
<div class="center" id="fallback">Loading front desk...</div>

<script>
  const WORKER = "https://nimbus-desk.propsightsg.workers.dev";
  const slug = new URLSearchParams(location.search).get("c") || "";
  const $ = id => document.getElementById(id);
  const thread = $("thread"), chipsEl = $("chips");
  const history = [];
  let muted = false, busy = false, cfg = null;
  const audio = new Audio(); audio.preload = "auto";

  const FONTS = {
    clean: "family=Plus+Jakarta+Sans:wght@400;500;600;700",
    warm:  "family=Figtree:wght@400;500;600&family=Hedvig+Letters+Serif",
    bold:  "family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800",
    sleek: "family=Space+Grotesk:wght@400;500;600;700"
  };

  function darken(hex, f){ const m=hex.replace('#','').match(/.{2}/g); if(!m) return hex;
    return '#'+m.map(h=>Math.max(0,Math.min(255,Math.round(parseInt(h,16)*f))).toString(16).padStart(2,'0')).join(''); }

  function add(cls, text){ const el=document.createElement("div"); el.className="msg "+cls; el.textContent=text;
    thread.appendChild(el); thread.scrollTop=thread.scrollHeight; return el; }
  function typing(){ const el=document.createElement("div"); el.className="typing"; el.setAttribute("aria-hidden","true");
    el.innerHTML="<span></span><span></span><span></span>"; thread.appendChild(el); thread.scrollTop=thread.scrollHeight; return el; }

  async function speak(text){ if(muted||!text) return;
    try{ const r=await fetch(WORKER,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({c:slug,text})});
      if(!r.ok) return; const b=await r.blob(); audio.pause(); audio.src=URL.createObjectURL(b); audio.currentTime=0; const p=audio.play(); if(p)p.catch(()=>{}); }catch(e){} }

  async function respond(text){
    if(busy) return; busy=true; $("send").disabled=true;
    add("out", text); history.push({role:"user",content:text});
    let msgs=history.slice(-12); if(msgs.length&&msgs[0].role!=="user")msgs=msgs.slice(1);
    const t=typing();
    const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(),9000);
    try{
      const r=await fetch(WORKER,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({c:slug,messages:msgs}),signal:ctrl.signal});
      const data=await r.json(); t.remove();
      const reply=(data&&data.reply)||"Sorry, could you say that again?";
      add("in",reply); history.push({role:"assistant",content:reply}); speak(reply);
    }catch(e){ t.remove(); add("in","Sorry, I dropped for a second there. Try me again, or leave your details below."); }
    finally{ clearTimeout(to); busy=false; $("send").disabled=false; $("input").focus(); }
  }

  // voice toggle
  $("dvoice").addEventListener("click",()=>{ muted=!muted; $("dvoice").classList.toggle("muted",muted);
    $("dvoice").setAttribute("aria-pressed",String(!muted)); $("vlabel").textContent=muted?"Voice off":"Voice on";
    $("vicon").innerHTML=muted?'<path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M23 9l-6 6M17 9l6 6"/>':'<path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7M19 5a9 9 0 0 1 0 14"/>';
    if(muted)audio.pause(); });

  // input
  $("bar").addEventListener("submit",e=>{ e.preventDefault(); const v=$("input").value.trim(); if(!v)return; $("input").value=""; respond(v); });

  // lead form
  $("leadopen").addEventListener("click",()=>$("lead").classList.add("on"));
  $("leadcancel").addEventListener("click",()=>$("lead").classList.remove("on"));
  $("leadform").addEventListener("submit",async e=>{ e.preventDefault();
    if($("lhp").value) return;   // honeypot: bots fill this, humans don't
    const name=$("lname").value.trim(), contact=$("lcontact").value.trim();
    const okContact=/@/.test(contact)||/\d{7,}/.test(contact.replace(/[\s-]/g,""));
    if(!okContact){ $("lcontact").style.borderColor="#b3261e"; $("lcontact").placeholder="Enter a phone or email"; $("lcontact").focus(); return; }
    const recent=history.filter(m=>m.role==="user").slice(-3).map(m=>m.content).join(" | ");
    try{ await fetch(WORKER+"/lead",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({c:slug,name,contact,intent:recent})}); }catch(e){}
    $("lead").classList.remove("on"); $("lname").value=""; $("lcontact").value="";
    add("in", "Thanks"+(name?", "+name:"")+", we've got your details and will follow up shortly."); });

  // boot
  (async function(){
    if(!slug){ $("fallback").textContent="No front desk specified."; return; }
    try{
      const r=await fetch(WORKER+"/config?c="+encodeURIComponent(slug));
      if(!r.ok){ $("fallback").textContent="This front desk isn't available right now."; return; }
      cfg=await r.json();
    }catch(e){ $("fallback").textContent="Couldn't load the front desk. Please try again."; return; }
    // style
    const style=["clean","warm","bold","sleek"].includes(cfg.style)?cfg.style:"clean";
    document.documentElement.dataset.style=style;
    $("fontlink").href="https://fonts.googleapis.com/css2?"+FONTS[style]+"&family=Spline+Sans+Mono:wght@400;500&display=swap";
    // brand colour
    const accent=cfg.accent||"#e8663a"; const ink=darken(accent,.72);
    document.documentElement.style.setProperty("--accent",accent);
    document.documentElement.style.setProperty("--accent-ink",ink);
    document.title=cfg.name+" — Front desk";
    $("dname").textContent=cfg.name;
    const TRADE_LABELS={beauty:"Beauty & grooming",home:"Home & trades",cleaning:"Cleaning & laundry",tuition:"Tuition & enrichment",fitness:"Fitness & wellness",fnb:"Food & beverage",pet:"Pet services",events:"Events & creative",automotive:"Automotive & workshop",professional:"Professional services",repairs:"Repairs & personal retail",property:"Property / real estate",insurance:"Insurance & financial"};
    const desc=(cfg.tagline&&cfg.tagline.trim())||TRADE_LABELS[cfg.trade]||"";
    if(desc){ $("dwho").textContent=desc; } else { $("dwho").style.display="none"; }
    $("fallback").style.display="none"; $("desk").style.display="flex";
    add("in", cfg.greeting||("Hi, welcome to "+cfg.business+". Ask me anything."));
    (cfg.chips||[]).forEach(q=>{ const b=document.createElement("button"); b.className="chip"; b.type="button"; b.textContent=q;
      b.addEventListener("click",()=>{ if(busy)return; b.classList.add("gone"); respond(q); }); chipsEl.appendChild(b); });
  })();
</script>
</body>
</html>

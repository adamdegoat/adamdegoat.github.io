<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Chat with PA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#07080d;--panel:#0c0e17;--in:#1a1d2b;--out:linear-gradient(110deg,#3a44b8,#1f8fa3);
    --txt:#eef0f7;--mut:#8b8fa6;--grad:linear-gradient(110deg,#6d7bff,#27d3ee);--green:#34d399;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:'Inter',system-ui,sans-serif;background:#000;display:flex;align-items:center;justify-content:center;color:var(--txt)}
  .phone{width:100%;max-width:460px;height:100vh;max-height:900px;display:flex;flex-direction:column;
    background:var(--bg);overflow:hidden;position:relative}
  @media(min-width:480px){.phone{border-radius:18px;height:92vh;box-shadow:0 30px 80px rgba(0,0,0,.6)}}
  body::before{content:"";position:fixed;inset:0;z-index:-1;
    background:radial-gradient(600px 400px at 50% 0%,rgba(109,123,255,.12),transparent 60%),#000}

  header{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--panel);border-bottom:1px solid rgba(255,255,255,.07);z-index:2}
  .av{width:42px;height:42px;border-radius:50%;flex:0 0 auto;background:var(--grad);display:flex;align-items:center;justify-content:center;font-weight:800;color:#06121a;font-size:16px}
  .who b{font-size:16px;font-weight:700;display:block;line-height:1.2}
  .who span{font-size:12px;color:var(--green)}
  .tag{margin-left:auto;font-size:10px;color:var(--mut);border:1px solid rgba(255,255,255,.12);padding:3px 9px;border-radius:20px}

  .feed{flex:1;overflow-y:auto;padding:18px 14px 10px;display:flex;flex-direction:column;gap:8px}
  .row{display:flex;max-width:84%}
  .row.me{align-self:flex-end;justify-content:flex-end}
  .row.her{align-self:flex-start}
  .bub{padding:9px 13px;border-radius:14px;font-size:14.5px;line-height:1.45;white-space:pre-wrap;word-wrap:break-word}
  .her .bub{background:var(--in);border-top-left-radius:4px}
  .me .bub{background:var(--out);border-top-right-radius:4px;color:#eef}
  .typing{display:flex;gap:4px;padding:12px 14px;background:var(--in);border-radius:14px;border-top-left-radius:4px;width:fit-content}
  .typing i{width:7px;height:7px;border-radius:50%;background:var(--mut);animation:bp 1.2s infinite}
  .typing i:nth-child(2){animation-delay:.18s}.typing i:nth-child(3){animation-delay:.36s}
  @keyframes bp{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}

  .starter{display:flex;gap:7px;flex-wrap:wrap;padding:0 14px 8px}
  .chip{font-size:12.5px;color:#c7ccea;background:rgba(109,123,255,.12);border:1px solid rgba(109,123,255,.3);padding:7px 12px;border-radius:18px;cursor:pointer}
  .chip:active{transform:scale(.96)}

  .bar{display:flex;gap:9px;padding:10px 12px;background:var(--panel);align-items:flex-end}
  .bar textarea{flex:1;resize:none;border:none;outline:none;background:var(--in);color:var(--txt);font-size:15px;font-family:inherit;padding:11px 14px;border-radius:22px;max-height:120px;line-height:1.4}
  .bar textarea::placeholder{color:var(--mut)}
  .send{width:46px;height:46px;border-radius:50%;border:none;flex:0 0 auto;cursor:pointer;background:var(--grad);color:#06121a;font-size:19px;display:flex;align-items:center;justify-content:center;transition:.12s}
  .send:active{transform:scale(.92)}.send:disabled{opacity:.4}
  .note{font-size:11px;color:var(--mut);text-align:center;padding:6px 14px;background:var(--panel)}
  .note a{color:#8b9bff;text-decoration:none}
</style>
</head>
<body>
<div class="phone">
  <header>
    <div class="av">PA</div>
    <div class="who"><b>PA</b><span>● Adam's Assistant · online</span></div>
    <div class="tag">LIVE DEMO</div>
  </header>
  <div class="feed" id="feed"></div>
  <div class="starter" id="starter">
    <span class="chip">What's my Bishan flat worth?</span>
    <span class="chip">Will I kena ABSD for a 2nd condo?</span>
    <span class="chip">Looking to rent in Tampines</span>
  </div>
  <div class="bar">
    <textarea id="box" rows="1" placeholder="Message PA…"></textarea>
    <button class="send" id="send" aria-label="Send">➤</button>
  </div>
  <div class="note">Live demo of PA. <a href="index.html">← Back</a> · <a href="call.html">🎙️ Talk to PA</a></div>
</div>

<script>
const BASE="https://prix-assigned-fibre-journey.trycloudflare.com";
const feed=document.getElementById('feed'), box=document.getElementById('box'), send=document.getElementById('send'), starter=document.getElementById('starter');
let history=[];
function now(){return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});}
function add(role,text){const r=document.createElement('div');r.className='row '+(role==='me'?'me':'her');
  const b=document.createElement('div');b.className='bub';b.textContent=text;r.appendChild(b);feed.appendChild(r);feed.scrollTop=feed.scrollHeight;}
function typing(on){let t=document.getElementById('typing');if(on){if(t)return;const r=document.createElement('div');r.className='row her';r.id='typing';r.innerHTML='<div class="typing"><i></i><i></i><i></i></div>';feed.appendChild(r);feed.scrollTop=feed.scrollHeight;}else if(t)t.remove();}
async function go(text){
  const msg=(text||box.value).trim(); if(!msg)return;
  starter.style.display='none'; box.value=''; box.style.height='auto'; add('me',msg); send.disabled=true; typing(true);
  try{
    const r=await fetch(BASE+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({history,message:msg})});
    const d=await r.json(); typing(false); add('her',d.reply);
    history.push({role:'user',content:msg},{role:'assistant',content:d.reply});
  }catch(e){typing(false);add('her',"Sorry, I couldn't connect right now — please try again in a moment.");}
  send.disabled=false; box.focus();
}
send.onclick=()=>go();
box.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();go();}});
box.addEventListener('input',()=>{box.style.height='auto';box.style.height=Math.min(box.scrollHeight,120)+'px';});
starter.querySelectorAll('.chip').forEach(c=>c.onclick=()=>go(c.textContent));
setTimeout(()=>add('her',"Hi! 👋 I'm PA, Adam's assistant. Are you looking to buy, sell, or rent — or just exploring?"),400);
</script>
</body>
</html>
